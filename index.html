<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VTP Portfolio"/>
<title>VTP Portfolio</title>
<style>
  :root {
    --bg:        #0a0f1e;
    --surface:   #111827;
    --surface2:  #1a2236;
    --border:    #1e2d45;
    --accent:    #3b82f6;
    --accent2:   #10b981;
    --warn:      #f59e0b;
    --danger:    #ef4444;
    --text:      #f1f5f9;
    --muted:     #64748b;
    --s1:        #3b82f6;
    --s2:        #a855f7;
    --s0:        #f59e0b;
    --h0:        #64748b;
    --positive:  #10b981;
    --negative:  #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; font-size: 14px; }
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #header .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  #refresh-btn, #local-btn, #runvtp-btn, #settings-btn, #kite-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  #refresh-btn:active, #local-btn:active, #runvtp-btn:active, #settings-btn:active, #kite-btn:active { opacity: 0.7; }
  #runvtp-btn:disabled { opacity: 0.5; cursor: wait; }
  .exec-bar { position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border); margin: 0 -16px -16px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .exec-bar button { flex: 1; background: var(--accent); border: none; border-radius: 8px; padding: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
  .exec-bar button:disabled { opacity: 0.5; }
  .row-check { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
  .cls-sel { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 3px 6px; font-size: 11px; }
  #local-btn.local-on { border-color: var(--accent2); color: var(--accent2); }
  #tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .big-number { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  .big-label  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .mini-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .mini-value { font-size: 16px; font-weight: 700; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .pill-s1 { background: rgba(59,130,246,0.15); color: var(--s1); }
  .pill-s2 { background: rgba(168,85,247,0.15); color: var(--s2); }
  .pill-s0 { background: rgba(245,158,11,0.15); color: var(--s0); }
  .pill-h0 { background: rgba(100,116,139,0.15); color: var(--h0); }
  .st-pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:9px; font-weight:700; }
  .st-hold { background: rgba(16,185,129,0.15);  color: #34d399; }
  .st-pq   { background: rgba(59,130,246,0.15);  color: #60a5fa; }
  .st-os   { background: rgba(168,85,247,0.15);  color: #c084fc; }
  .st-nik  { background: rgba(100,116,139,0.2);  color: #94a3b8; }
  .st-wl   { background: rgba(245,158,11,0.15);  color: #fbbf24; }
  .st-oob  { background: rgba(100,116,139,0.15); color: var(--muted); }
  .strat-card { border-radius: 10px; padding: 14px; margin-bottom: 8px; }
  .strat-card.s1 { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); }
  .strat-card.s2 { background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.2); }
  .strat-card.s0 { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); }
  .strat-card .row { display: flex; justify-content: space-between; align-items: center; }
  .strat-card .pat { font-size: 20px; font-weight: 700; }
  .strat-card .details { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .strat-card .d-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .strat-card .d-val { font-size: 12px; font-weight: 600; margin-top: 1px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { text-align: left; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .tbl td { padding: 8px; border-bottom: 1px solid rgba(30,45,69,0.5); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: rgba(255,255,255,0.02); }
  .prog-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
  .balance-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .balance-row:last-child { border-bottom: none; }
  .balance-label { font-size: 12px; color: var(--muted); }
  .balance-value { font-size: 13px; font-weight: 600; }
  .pos { color: var(--positive); }
  .neg { color: var(--negative); }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 16px; text-align: center; color: #fca5a5; font-size: 13px; line-height: 1.5; }
  .sec-head { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .sec-head .badge { font-size: 10px; background: var(--surface2); padding: 2px 7px; border-radius: 10px; color: var(--muted); font-weight: 500; }
  .trade-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .trade-row:last-child { border-bottom: none; }
  .trade-side { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 6px; }
  .buy  { background: rgba(16,185,129,0.15); color: var(--positive); }
  .sell { background: rgba(239,68,68,0.15);  color: var(--negative); }
  .trade-sym  { font-size: 13px; font-weight: 700; flex: 1; }
  .trade-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .trade-val  { text-align: right; }
  .trade-pat  { font-size: 12px; font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  #config { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; }
  #config.open { display: flex; }
  #config-box { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px; width: 100%; }
  #config-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  #config-box p  { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  #sid-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; margin-bottom: 10px; outline: none; }
  #sid-input:focus { border-color: var(--accent); }
  #save-sid { width: 100%; background: var(--accent); border: none; border-radius: 8px; padding: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
  @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
  .metric-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:12px; }
  .metric-row:last-child { border-bottom:none; }
  .metric-label { color:var(--muted); }
  .metric-value { font-weight:600; }
  .loan-hero { background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.3); border-radius:12px; padding:14px 16px; margin-bottom:10px; }
  .sub-tabs { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .sub-tab { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
  .sub-tab.active { background:rgba(59,130,246,0.15); border-color:var(--accent); color:var(--accent); }
  .act-status { font-size:10px; font-weight:700; padding:3px 7px; border-radius:6px; }
  .act-pending { background: rgba(245,158,11,0.15); color:#fbbf24; }
  .act-done    { background: rgba(16,185,129,0.15); color:#34d399; }
  .act-error   { background: rgba(239,68,68,0.15);  color:#f87171; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>VTP Portfolio</h1>
      <div class="sub" id="last-updated">Loading…</div>
    </div>
    <div style="display:flex;gap:8px">
      <button id="kite-btn" onclick="kiteLogin()" title="Refresh Kite token">🔑</button>
      <button id="runvtp-btn" onclick="runVtp()" style="border-color:rgba(16,185,129,0.5);color:var(--accent2)">▶ Run VTP</button>
      <button id="local-btn" onclick="toggleLocal()">📂 Local</button>
      <button id="refresh-btn" onclick="loadData()">↻</button>
      <button id="settings-btn" onclick="document.getElementById('config').classList.add('open')">⚙</button>
    </div>
  </div>
  <input type="file" id="local-file" accept=".xlsx,.xlsm" style="display:none" onchange="loadLocalFile(this.files[0])"/>
  <div id="tabs">
    <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="tab" onclick="showTab('ps2')">Progress S2</div>
    <div class="tab" onclick="showTab('ps1')">Progress S1</div>
    <div class="tab" onclick="showTab('open')">Open Positions</div>
    <div class="tab" onclick="showTab('closed')">Closed Positions</div>
    <div class="tab" onclick="showTab('trades')">Actions</div>
  </div>
  <div id="content">
    <div id="loading"><div class="spinner"></div><span>Loading portfolio…</span></div>
  </div>
</div>
<div id="logmodal" style="display:none;position:fixed;inset:0;background:rgba(3,7,18,0.96);z-index:200;flex-direction:column">
  <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
    <b id="logtitle" style="font-size:14px">Run Log</b>
    <button onclick="document.getElementById('logmodal').style.display='none'"
      style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer">✕ Close</button>
  </div>
  <pre id="logbody" style="flex:1;overflow:auto;margin:0;padding:14px 16px;font-size:10.5px;line-height:1.7;color:#c9d1d9;white-space:pre-wrap;-webkit-overflow-scrolling:touch"></pre>
</div>
<div id="config">
  <div id="config-box">
    <h3>Settings</h3>
    <p>Sheet ID for reading (sheet must be viewable via link). Web App URL + token enable Run VTP and action execution from this app.</p>
    <input id="sid-input" placeholder="Spreadsheet ID (from URL)" />
    <input id="wa-url-input" placeholder="GAS Web App URL (…/exec)" />
    <input id="wa-token-input" placeholder="Web App token" />
    <button id="save-sid" onclick="saveSettings()">Save & Load</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── Config ───────────────────────────────────────────────────────────────────
// Points to the VTP GAS sheet ("My Equity" — same sheet as the daily runner)
// Data model version: repo-2026-07-04 (15-col VTP_Repo, lowercase statuses)
const DEFAULT_SHEET_ID = '131zCFolNvpwyvNqWRI5bL9BJmZNUhLfVu1Ypy7XOvUg';
const DEFAULT_WA_URL   = 'https://script.google.com/macros/s/AKfycbxYxiBuyPNS19E20X25auKmC7ykJToiIBELyl6_-J5_3irLaGF_l_Aof2z2e0pZsSEB0g/exec';
const DEFAULT_WA_TOKEN = 'Pramod@234';
let SHEET_ID = localStorage.getItem('vtp_sheet_id') || DEFAULT_SHEET_ID;
let WA_URL   = localStorage.getItem('vtp_wa_url')   || DEFAULT_WA_URL;
let WA_TOKEN = localStorage.getItem('vtp_wa_token') || DEFAULT_WA_TOKEN;

// ── State ────────────────────────────────────────────────────────────────────
let state = { repo: [], open: [], closed: [], summary: [], fundBlock: {}, progress1: [], progress2: [], s2xirr: [], actions: [], loaded: false };
let currentTab = 'dashboard';
let progressSubTab = 's1';
let positionsCat = localStorage.getItem('vtp_pos_cat') || 'held';

// Repo status buckets
const HELD_STATUSES = new Set(['in_holdings', 'prior_quarter', 'other_strategy', 'not_in_kite']);
const WL_STATUSES   = new Set(['alerted', 'gtt_placed']);

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => {
  if (n === null || n === undefined || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return n;
  return (num >= 0 ? '' : '-') + '₹' + Math.abs(num).toLocaleString('en-IN', {maximumFractionDigits: 0});
};
const fmtP = n => (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
const fmtN = n => {
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return (num >= 0 ? '+' : '') + '₹' + num.toLocaleString('en-IN', {maximumFractionDigits: 0});
};
const cls  = n => parseFloat(n) >= 0 ? 'pos' : 'neg';
const pill = s => `<span class="pill pill-${(s||'').toLowerCase()}">${s||'—'}</span>`;
// Strip Indian-format commas before parsing numbers (e.g. "-7,13,000" → -713000)
function parseAmt(v) { return v == null ? 0 : parseFloat(String(v).replace(/,/g, '')) || 0; }

// Cell helpers for positional rows ({v, f} gviz cells)
const val  = c => (c == null) ? null : (c.v != null ? c.v : c.f);
const disp = c => (c == null) ? ''   : (c.f != null ? c.f : (c.v != null ? c.v : ''));

function statusPill(st) {
  const MAP = {
    in_holdings:   ['st-hold', 'HOLDING'],
    prior_quarter: ['st-pq',   'PRIOR QTR'],
    other_strategy:['st-os',   'HELD'],
    not_in_kite:   ['st-nik',  'NOT IN KITE'],
    gtt_placed:    ['st-wl',   'GTT PLACED'],
    alerted:       ['st-wl',   'ALERTED'],
    out_of_budget: ['st-oob',  'OOB'],
  };
  const [c, label] = MAP[st] || ['st-oob', (st||'—').toUpperCase()];
  return `<span class="st-pill ${c}">${label}</span>`;
}

// ── Local workbook (testing) ──────────────────────────────────────────────────
// 📂 Local loads My Equity.xlsx via SheetJS; both fetchers then serve from it.
// Click the button again to switch back to the Google Sheet.
let localWB = null, localName = '';

// Load SheetJS on demand with CDN fallbacks (static tag can be blocked/offline)
let sheetJsPromise = null;
function ensureSheetJS() {
  if (window.XLSX) return Promise.resolve();
  if (sheetJsPromise) return sheetJsPromise;
  const srcs = [
    'xlsx.full.min.js',   // local copy in the same folder — works offline
    'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
    'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
    'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js',
  ];
  sheetJsPromise = new Promise((resolve, reject) => {
    let i = 0;
    const tryNext = () => {
      if (i >= srcs.length) {
        sheetJsPromise = null;
        reject(new Error('Could not load the XLSX library from any CDN — check internet connection / content blockers'));
        return;
      }
      const s = document.createElement('script');
      s.src = srcs[i++];
      s.onload  = () => window.XLSX ? resolve() : tryNext();
      s.onerror = tryNext;
      document.head.appendChild(s);
    };
    tryNext();
  });
  return sheetJsPromise;
}

function toggleLocal() {
  if (localWB) {
    localWB = null; localName = '';
    document.getElementById('local-btn').textContent = '📂 Local';
    document.getElementById('local-btn').classList.remove('local-on');
    loadData();
  } else {
    document.getElementById('local-file').click();
  }
}
function loadLocalFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      await ensureSheetJS();
      localWB = XLSX.read(e.target.result, { type: 'array', cellDates: false });
      localName = file.name;
      document.getElementById('local-btn').textContent = '☁ Back to Sheet';
      document.getElementById('local-btn').classList.add('local-on');
      loadData();
    } catch (err) {
      alert('Could not read file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  document.getElementById('local-file').value = '';   // allow re-selecting same file
}
// Worksheet → rows of gviz-style cells [{v, f}]
function wsCells_(ws) {
  if (!ws || !ws['!ref']) return [];
  const range = XLSX.utils.decode_range(ws['!ref']);
  const rows = [];
  for (let R = range.s.r; R <= range.e.r; R++) {
    const row = [];
    for (let C = range.s.c; C <= range.e.c; C++) {
      const cell = ws[XLSX.utils.encode_cell({ r: R, c: C })];
      row.push(cell ? { v: cell.v != null ? cell.v : null, f: cell.w != null ? cell.w : null } : null);
    }
    rows.push(row);
  }
  return rows;
}

// ── Sheets API ────────────────────────────────────────────────────────────────
// Label-keyed rows (for sheets with unique headers: Yearly Summary, Progress…)
async function fetchSheet(sheetName) {
  if (localWB) {
    const ws = localWB.Sheets[sheetName];
    if (!ws) return [];
    const cells = wsCells_(ws);
    if (cells.length === 0) return [];
    const labels = cells[0].map((c, i) => ((c && c.v != null) ? String(c.v).trim() : '') || `col${i}`);
    return cells.slice(1).map(r => {
      const obj = {};
      labels.forEach((L, i) => { const c = r[i]; obj[L] = c ? (c.v != null ? c.v : c.f) : null; });
      return obj;
    });
  }
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`Failed to fetch ${sheetName}: HTTP ${res.status}`);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?$/, ''));
  if (!json.table || !json.table.rows) return [];
  const cols = json.table.cols.map((c, i) => (c.label || '').trim() || `col${i}`);
  return json.table.rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => { obj[c] = r.c[i] ? (r.c[i].v !== null ? r.c[i].v : r.c[i].f) : null; });
    return obj;
  });
}

// Positional rows (VTP_Repo, Closed Trades, Actions) — immune to duplicate
// header labels (Closed Trades has Qty/Price/Value/Charge twice: buy + sell)
async function fetchSheetRows(sheetName) {
  if (localWB) {
    const ws = localWB.Sheets[sheetName];
    if (!ws) throw new Error('Sheet not found in local file: ' + sheetName);
    return wsCells_(ws).slice(1);   // drop header row — matches gviz headers=1
  }
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`Failed to fetch ${sheetName}: HTTP ${res.status}`);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?$/, ''));
  if (!json.table || !json.table.rows) return [];
  return json.table.rows.map(r => r.c || []);
}

// ── Parse Yearly Summary ──────────────────────────────────────────────────────
function parseSummary(rows) {
  const summary = [];
  const fund    = { byStrategy: {}, s2: {} };
  const FUND_LABELS = ['S1 PAT','S2 PAT','S0 PAT','H0 PAT','Funds Input','Currently Invested',
       'Tax Pending','Tax Provision','Ideal Fund Balance','Actual Balance','Actual Fund Balance',
       'Cash Out','Booked Funds','PAT'];
  for (const row of rows) {
    const keys = Object.keys(row);
    const colA = row['FY']         != null ? row['FY']         : row[keys[0]];
    const colB = row['Strategy']   != null ? row['Strategy']   : row[keys[1]];
    const colC = row['Lots']       != null ? row['Lots']       : row[keys[2]];
    const colF = row['Sell Value'] != null ? row['Sell Value'] : row[keys[5]];

    if (colA && String(colA).startsWith('FY')) {
      const pat  = parseFloat(row['PAT'])        || 0;
      const pbt  = parseFloat(row['PBT'])        || 0;
      const tax  = parseFloat(row['Tax'])        || 0;
      const lots = parseFloat(colC)              || 0;
      const bv   = parseFloat(row['Buy Value'])  || 0;
      const sv   = parseFloat(colF)              || 0;
      const ebit = parseFloat(row['EBIT'])       || 0;
      summary.push({ fy: colA, strategy: colB, lots, buyValue: bv, sellValue: sv, ebit, pbt, tax, pat });
    }

    const isBlankA = colA == null || String(colA).trim() === '';
    const label = String(isBlankA ? (colB || '') : '').trim();
    if (label && FUND_LABELS.some(k => label.includes(k))) {
      const s2val  = parseFloat(colC) || 0;
      const totval = parseFloat(colF) || s2val;
      fund.s2[label]           = s2val;
      fund.byStrategy[label]   = totval;
      if (label.includes('Funds Input'))        fund.fundsInput = totval;
      if (label.includes('Ideal'))              fund.ideal      = totval;
      if (label.includes('Actual Fund Balance'))fund.actual     = totval;
      if (label.includes('Currently Invested')) fund.invested   = s2val;
      if (label.includes('Tax Pending') || label.includes('Tax Provision')) fund.taxPending = s2val;
    }
  }
  return { summary, fund };
}

// ── Load all data ─────────────────────────────────────────────────────────────
async function loadData() {
  setContent('<div id="loading"><div class="spinner"></div><span>Loading portfolio…</span></div>');
  document.getElementById('last-updated').textContent = 'Refreshing…';
  try {
    const [repoRows, closedRows, summaryRows, prog1RawA, prog1RawB, actionRows, prog2Rows, s2xirrRows] = await Promise.all([
      fetchSheetRows('VTP_Repo'),
      fetchSheetRows('Closed Trades'),
      fetchSheet('Yearly Summary').catch(() => []),
      fetchSheetRows('Progress_S1').catch(() => []),
      fetchSheetRows('Progress S1').catch(() => []),
      fetchSheetRows('Actions').catch(() => []),
      fetchSheet('Progress_S2').catch(() => []),
      fetchSheet('S2_XIRR').catch(() => []),
    ]);
    const prog1Rows = (prog1RawA && prog1RawA.length > 0) ? prog1RawA : prog1RawB;

    // ── VTP_Repo — 15 cols A–O (positional) ───────────────────────────────────
    // Ref | Ticker | Status | Strategy | Trigger | Value Price | Ideal Qty |
    // Lot Size | Buy Date | Qty | Price | Value | Charge | Buy GTT | Sell GTT
    state.repo = repoRows
      .filter(r => val(r[1]) && String(val(r[1])).trim() !== '' && String(val(r[1])).trim() !== 'Ticker')
      .map(r => ({
        ref:        String(disp(r[0]) || '').replace(/\.0$/, ''),
        ticker:     String(val(r[1])).trim(),
        status:     String(val(r[2]) || '').trim(),
        strategy:   String(val(r[3]) || '').trim(),
        trigger:    parseAmt(val(r[4])),
        valuePrice: parseAmt(val(r[5])),
        idealQty:   parseAmt(val(r[6])),
        buyDate:    disp(r[8]),
        qty:        parseAmt(val(r[9])),
        price:      parseAmt(val(r[10])),
        value:      parseAmt(val(r[11])),
        charge:     parseAmt(val(r[12])),
        buyGtt:     String(disp(r[13]) || ''),
        sellGtt:    String(disp(r[14]) || ''),
      }));
    state.open = state.repo.filter(r => HELD_STATUSES.has(r.status));

    // ── Closed Trades — 21 cols (positional; duplicate buy/sell headers) ──────
    state.closed = closedRows
      .filter(r => val(r[2]) && String(val(r[2])).trim() !== '' && String(val(r[2])).trim() !== 'Scrip')
      .map(r => ({
        ref:       String(disp(r[0]) || '').replace(/\.0$/, ''),
        buyDate:   disp(r[1]),
        scrip:     String(val(r[2])).trim(),
        qty:       parseAmt(val(r[3])),
        buyPrice:  parseAmt(val(r[4])),
        buyValue:  parseAmt(val(r[5])),
        sellDate:  disp(r[7]),
        sellQty:   parseAmt(val(r[8])),
        sellPrice: parseAmt(val(r[9])),
        sellValue: parseAmt(val(r[10])),
        ebit:      parseAmt(val(r[12])),
        pbt:       parseAmt(val(r[14])),
        tax:       parseAmt(val(r[15])),
        pat:       parseAmt(val(r[16])),
        strategy:  String(val(r[18]) || '').trim(),
        fy:        String(val(r[19]) || '').trim(),
      }));

    // ── Actions sheet — pending / done / error rows ───────────────────────────
    const ACTION_TYPES = new Set(['PLACE_BUY_GTT','PLACE_SELL_GTT','REORDER_BUY_GTT','CANCEL_GTT',
      'ADD_S0_ROW','ADD_S2_ROW','ADD_ORPHAN_REPO_ROW','DELETE_S1_ROW','DELETE_S2_ROW',
      'CLOSE_LOT','CLASSIFY_FILL','QUARTERLY_RESET','NEEDS_ATTENTION']);
    // sheetRow: gviz headers=1 consumes the title row, so data index 0 = sheet row 2
    state.actions = (actionRows || [])
      .map((r, i) => ({ r, sheetRow: i + 2 }))
      .filter(x => ACTION_TYPES.has(String(val(x.r[1]) || '').trim()))
      .map(x => ({
        sheetRow: x.sheetRow,
        action:   String(val(x.r[1])).trim(),
        symbol:   String(val(x.r[2]) || '').trim(),
        strategy: String(val(x.r[3]) || '').trim(),
        details:  String(val(x.r[4]) || '').trim(),
        recPrice: disp(x.r[5]),
        recQty:   disp(x.r[6]),
        status:   String(val(x.r[9]) || 'Pending').trim(),
      }));
    // Run date from the title cell if visible in any row
    const titleRow = (actionRows || []).find(r => String(val(r[0]) || '').includes('VTP Daily Check'));
    state.actionsTitle = titleRow ? String(val(titleRow[0])) : '';

    // Authoritative row numbers from the web app — gviz drops the merged title
    // row, so its derived indexes can be off by one (MAPMYINDIA row-5 mismatch).
    // Execution needs the web app anyway, so its list wins when available.
    if (WA_URL && !localWB) {
      try {
        const j = await waGet({ fn: 'actions' });
        state.actions = (j.actions || []).map(a => ({
          sheetRow: a.row,
          action:   a.action,
          symbol:   a.symbol,
          strategy: a.strategy,
          details:  a.details,
          recPrice: a.recPrice != null ? a.recPrice : '',
          recQty:   a.recQty   != null ? a.recQty   : '',
          status:   a.status || 'Pending',
        }));
      } catch (e) {
        console.warn('[VTP] web app actions fetch failed — falling back to gviz rows:', e.message);
      }
    }

    // ── Yearly Summary ────────────────────────────────────────────────────────
    const { summary, fund } = parseSummary(summaryRows);
    state.summary   = summary;
    state.fundBlock = fund;

    // ── Progress S1 (positional) ──────────────────────────────────────────────
    // Table 1 (A–M): lot matrix — #, Month, Inv, slots 1..10 ("Booked" marks)
    // Table 2 (O–Q): booking projection — Label (Consol FY / month), Bookings, Cum
    state.prog1Lots = (prog1Rows || []).filter(r => {
      const m = String(val(r[1]) || '').trim();
      return m !== '' && m !== 'Month';
    }).map(r => ({
      num:   val(r[0]),
      month: String(val(r[1])).trim(),
      inv:   parseAmt(val(r[2])),
      slots: Array.from({length: 10}, (_, i) => String(val(r[3 + i]) ?? '').trim()),
    }));
    // Locate the booking-projection table by finding the "Consol …" label
    // column (currently P; auto-detects if columns shift)
    let bookCol = -1;
    for (const r of (prog1Rows || [])) {
      for (let c = 12; c <= 22; c++) {
        if (/^consol/i.test(String(val(r[c]) || '').trim())) { bookCol = c; break; }
      }
      if (bookCol >= 0) break;
    }
    state.prog1Book = bookCol < 0 ? [] :
      (prog1Rows || []).filter(r => String(val(r[bookCol]) || '').trim() !== '')
        .map(r => ({
          label: String(val(r[bookCol])).trim(),
          cnt:   parseAmt(val(r[bookCol + 1])),
          cum:   parseAmt(val(r[bookCol + 2])),
        }));

    // ── Progress S2 ───────────────────────────────────────────────────────────
    state.progress2 = (prog2Rows || []).filter(r => {
      const keys = Object.keys(r);
      const month = r[keys[1]];
      return month && String(month).trim() !== '' && String(month) !== 'Month';
    }).map(r => {
      const keys = Object.keys(r);
      return { num: r[keys[0]], month: r[keys[1]], target: parseFloat(r[keys[2]])||0,
               actual: parseFloat(r[keys[3]])||0, cum_target: parseFloat(r[keys[4]])||0,
               cum_actual: parseFloat(r[keys[5]])||0 };
    });

    // ── S2_XIRR ───────────────────────────────────────────────────────────────
    state.s2xirr = (s2xirrRows || []).filter(r => {
      const keys = Object.keys(r);
      const t = [r['Type'], r[keys[4]], r[keys[2]]].find(v => v === 'Loan' || v === 'EMI');
      return !!t;
    }).map(r => {
      const keys = Object.keys(r);
      const type = [r['Type'], r[keys[4]], r[keys[2]]].find(v => v === 'Loan' || v === 'EMI');
      const isEMI = type === 'EMI';
      return {
        date:      r['Date'] || r[keys[0]],
        amount:    parseAmt(r['Total EMI'] || r['Amount'] || r[keys[1]]),
        principal: isEMI ? (parseAmt(r['Principal'] || r[keys[2]]) || null) : null,
        interest:  isEMI ? (parseAmt(r['Interest']  || r[keys[3]]) || null) : null,
        type,
      };
    }).filter(r => r.amount !== 0);

    console.log('[VTP] repo rows:', state.repo.length, 'held:', state.open.length);
    console.log('[VTP] closed:', state.closed.length, 'actions:', state.actions.length);

    state.loaded = true;
    document.getElementById('last-updated').textContent = localWB
      ? '📂 ' + localName
      : 'Updated ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    renderTab(currentTab);

  } catch (e) {
    setContent(`<div class="error-box">Failed to load data.<br><br>${e.message}<br><br>
      Make sure the sheet is public (Share → Anyone with link → Viewer).<br><br>
      <button onclick="document.getElementById('config').classList.add('open')"
        style="margin-top:10px;padding:8px 16px;background:var(--accent);border:none;border-radius:8px;color:white;font-size:13px;cursor:pointer;">
        Change Sheet ID
      </button></div>`);
    document.getElementById('last-updated').textContent = 'Failed to load';
  }
}

// ── Tab routing ───────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabs = ['dashboard','ps2','ps1','open','closed','trades'];
  document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
  if (state.loaded) renderTab(tab);
}
function renderTab(tab) {
  if      (tab === 'dashboard') renderDashboard();
  else if (tab === 'ps2')       renderProgressS2();
  else if (tab === 'ps1')       renderProgressS1();
  else if (tab === 'open')      renderPositions();
  else if (tab === 'closed')    renderClosed();
  else if (tab === 'trades')    renderActions();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
// Row 1: Total PAT · Total Invested · Cash Balance
// Row 2: PAT of last three FYs (tap a year to drive Row 3)
// Row 3: Strategy breakdown for the selected FY (default: current FY)
let dashFY = null;
function setDashFY(fy) { dashFY = fy; renderDashboard(); }

function renderDashboard() {
  const fys = [...new Set(state.summary.map(r => r.fy))].sort().reverse();
  if (!dashFY || !fys.includes(dashFY)) dashFY = fys[0] || null;

  const totalPAT = state.summary.reduce((a, r) => a + r.pat, 0);
  const invested = state.open.reduce((a, r) => a + r.value + r.charge, 0);  // held lots (all categories)
  const cash     = state.fundBlock.actual || 0;

  const pendingActs = state.actions.filter(a => a.status === 'Pending');
  const errorActs   = state.actions.filter(a => a.status.startsWith('ERROR'));

  // Row 2 — last three FYs
  const last3 = fys.slice(0, 3);
  const fyAgg = fy => {
    const rows = state.summary.filter(r => r.fy === fy);
    return { pat: rows.reduce((a,r) => a + r.pat, 0), lots: rows.reduce((a,r) => a + r.lots, 0) };
  };

  // Row 3 — strategy breakdown for dashFY
  const stratCards = ['S1','S2','S0'].map(s => {
    const rows = state.summary.filter(r => r.fy === dashFY && r.strategy === s);
    if (rows.length === 0) return '';
    const pat  = rows.reduce((a,r) => a + r.pat, 0);
    const lots = rows.reduce((a,r) => a + r.lots, 0);
    const ebit = rows.reduce((a,r) => a + r.ebit, 0);
    const tax  = rows.reduce((a,r) => a + r.tax, 0);
    return `
    <div class="strat-card ${s.toLowerCase()}">
      <div class="row">${pill(s)}<span class="pat ${cls(pat)}">${fmt(pat)}</span></div>
      <div class="details">
        <div class="d-item"><div class="d-label">Lots</div><div class="d-val">${lots}</div></div>
        <div class="d-item"><div class="d-label">EBIT</div><div class="d-val ${cls(ebit)}">${fmt(ebit)}</div></div>
        <div class="d-item"><div class="d-label">Tax</div><div class="d-val neg">${fmt(tax)}</div></div>
      </div>
    </div>`;
  }).join('');

  setContent(`
    <div class="grid-3">
      <div class="mini-card">
        <div class="mini-label">Total PAT</div>
        <div class="mini-value ${cls(totalPAT)}">${fmt(totalPAT)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">all time</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Total Invested</div>
        <div class="mini-value">${fmt(invested)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">${state.open.length} held lots</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Cash Balance</div>
        <div class="mini-value ${cls(cash)}">${fmt(cash)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">actual fund balance</div>
      </div>
    </div>

    ${last3.length ? `
    <div class="grid-3">
      ${last3.map(fy => {
        const a = fyAgg(fy);
        const active = fy === dashFY;
        return `
        <div class="mini-card" onclick="setDashFY('${fy}')"
             style="cursor:pointer;${active ? 'border-color:var(--accent);background:rgba(59,130,246,0.08)' : ''}">
          <div class="mini-label" ${active ? 'style="color:var(--accent)"' : ''}>${fy}</div>
          <div class="mini-value ${cls(a.pat)}">${fmt(a.pat)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">${a.lots} lots</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${dashFY ? `<div class="sec-head">Strategy Breakdown <span class="badge">${dashFY}</span></div>${stratCards || '<div class="card" style="text-align:center;color:var(--muted)">No closed lots in ' + dashFY + '</div>'}` : ''}

    ${(pendingActs.length || errorActs.length) ? `
    <div class="card" style="border-color:${errorActs.length?'rgba(239,68,68,0.4)':'rgba(245,158,11,0.4)'}">
      <div class="card-title">Actions Waiting</div>
      ${state.actions.filter(a => a.status === 'Pending' || a.status.startsWith('ERROR')).slice(0,4).map(a => `
        <div class="trade-row">
          <span class="act-status ${a.status.startsWith('ERROR')?'act-error':'act-pending'}">${a.status.startsWith('ERROR')?'ERR':'PEND'}</span>
          <div style="flex:1">
            <div class="trade-sym">${a.symbol}</div>
            <div class="trade-meta">${a.action}</div>
          </div>
        </div>`).join('')}
      <div style="font-size:11px;color:var(--muted);margin-top:8px;cursor:pointer" onclick="showTab('trades')">View all →</div>
    </div>` : ''}
  `);
}

const POS_CATS = [
  { id:'held', label:'All Held',    test: r => HELD_STATUSES.has(r.status) },
  { id:'s1',   label:'S1',          test: r => r.strategy === 'S1' && (r.status === 'in_holdings' || r.status === 'prior_quarter') },
  { id:'hold', label:'Holdings',    test: r => r.status === 'in_holdings' },
  { id:'pq',   label:'Prior Qtr',   test: r => r.status === 'prior_quarter' },
  { id:'s2',   label:'S2',          test: r => r.status === 'other_strategy' && r.strategy === 'S2' },
  { id:'s0',   label:'S0',          test: r => r.status === 'other_strategy' && r.strategy === 'S0' },
  { id:'nik',  label:'Not in Kite', test: r => r.status === 'not_in_kite' },
  { id:'wl',   label:'Watchlist',   test: r => WL_STATUSES.has(r.status) },
  { id:'oob',  label:'OOB',         test: r => r.status === 'out_of_budget' },
];

function setPosCat(id) {
  positionsCat = id;
  localStorage.setItem('vtp_pos_cat', id);
  renderPositions();
}

// ── Table sorting ─────────────────────────────────────────────────────────────
let posSort    = { key: 'value',    dir: -1 };
let closedSort = { key: 'sellDate', dir: -1 };
let currentClosedFY = null;

function sortRows(arr, key, dir, getters) {
  const g = getters[key] || (r => r[key]);
  return [...arr].sort((a, b) => {
    const va = g(a), vb = g(b);
    if (typeof va === 'string' || typeof vb === 'string')
      return String(va || '').localeCompare(String(vb || ''), undefined, { numeric: true }) * dir;
    return ((va || 0) - (vb || 0)) * dir;
  });
}
function th(label, key, cur, fnName, align) {
  const arrow = cur.key === key ? (cur.dir === 1 ? ' ▲' : ' ▼') : '';
  return `<th style="cursor:pointer;user-select:none;${align ? 'text-align:' + align : ''}" onclick="${fnName}('${key}')">${label}${arrow}</th>`;
}
function setPosSort(key)    { posSort    = posSort.key    === key ? { key, dir: -posSort.dir }    : { key, dir: -1 }; renderPositions(); }
function setClosedSort(key) { closedSort = closedSort.key === key ? { key, dir: -closedSort.dir } : { key, dir: -1 }; renderClosed(currentClosedFY); }

const dateVal = s => { const d = parsePortDate(s); return d ? d.getTime() : 0; };

function renderPositions() {
  const cat  = POS_CATS.find(c => c.id === positionsCat) || POS_CATS[0];
  const rows = state.repo.filter(cat.test);
  const isWatch = cat.id === 'wl' || cat.id === 'oob';

  const chips = `<div class="sub-tabs">${POS_CATS.map(c => {
    const n = state.repo.filter(c.test).length;
    return `<div class="sub-tab ${c.id===positionsCat?'active':''}" onclick="setPosCat('${c.id}')">${c.label} <span style="opacity:0.6">${n}</span></div>`;
  }).join('')}</div>`;

  if (rows.length === 0) {
    setContent(`${chips}<div class="card" style="text-align:center;padding:32px;color:var(--muted)">No rows in this category.</div>`);
    return;
  }

  if (isWatch) {
    // Watchlist / OOB — show trigger & value price
    const WATCH_KEYS = ['ticker','trigger','valuePrice','idealQty'];
    const sk  = WATCH_KEYS.includes(posSort.key) ? posSort : { key: 'ticker', dir: 1 };
    const sorted = sortRows(rows, sk.key, sk.dir, { ticker: r => r.ticker });
    setContent(`${chips}
      <div class="sec-head">${cat.label} <span class="badge">${sorted.length}</span></div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="tbl">
          <thead><tr>
            ${th('Scrip','ticker',sk,'setPosSort')}
            ${th('Trigger','trigger',sk,'setPosSort')}
            ${th('Value Px','valuePrice',sk,'setPosSort')}
            ${th('Qty · ~Lot','idealQty',sk,'setPosSort','right')}
          </tr></thead>
          <tbody>
            ${sorted.map(r => `
              <tr>
                <td><div style="font-weight:600">${r.ticker}</div><div style="font-size:10px;margin-top:1px">${statusPill(r.status)} <span style="color:var(--muted)">${r.ref}</span></div></td>
                <td>${r.trigger ? '₹' + r.trigger.toLocaleString('en-IN') : '—'}</td>
                <td>${r.valuePrice ? '₹' + r.valuePrice.toLocaleString('en-IN') : '—'}</td>
                <td style="text-align:right">${r.idealQty || '—'}${r.idealQty && r.valuePrice ? `<div style="font-size:10px;color:var(--muted)">${fmt(r.idealQty * r.valuePrice)}</div>` : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`);
    return;
  }

  // Held lots — qty / price / value
  const HELD_KEYS = ['ticker','buyDate','qty','price','value'];
  const sk  = HELD_KEYS.includes(posSort.key) ? posSort : { key: 'value', dir: -1 };
  const sorted = sortRows(rows, sk.key, sk.dir, { ticker: r => r.ticker, buyDate: r => dateVal(r.buyDate) });
  const total  = sorted.reduce((a,r) => a + r.value + r.charge, 0);
  setContent(`${chips}
    <div class="sec-head">${cat.label} <span class="badge">${sorted.length}</span></div>
    <div class="card" style="padding:12px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between">
        <div><div style="font-size:10px;color:var(--muted)">Total Value</div><div style="font-size:18px;font-weight:700;margin-top:2px">${fmt(total)}</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:var(--muted)">Lots</div><div style="font-size:18px;font-weight:700;margin-top:2px">${sorted.length}</div></div>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="tbl">
        <thead><tr>
          ${th('Scrip','ticker',sk,'setPosSort')}
          ${th('Date','buyDate',sk,'setPosSort')}
          ${th('Qty','qty',sk,'setPosSort')}
          ${th('Price','price',sk,'setPosSort')}
          ${th('Value','value',sk,'setPosSort','right')}
        </tr></thead>
        <tbody>
          ${sorted.map(r => `
            <tr>
              <td>
                <div style="font-weight:600">${r.ticker}</div>

// ── Web App bridge — Run VTP + execute actions from the phone ─────────────────
async function waPost(payload) {
  if (!WA_URL) throw new Error('Web App URL not set — tap ⚙ and add URL + token');
  payload.token = WA_TOKEN;
  const res = await fetch(WA_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },   // avoids CORS preflight
    body: JSON.stringify(payload),
  });
  const j = await res.json();
  if (!j.ok) throw new Error(j.error || 'web app error');
  return j;
}

async function waGet(params) {
  if (!WA_URL) throw new Error('Web App URL not set — tap ⚙ and add URL + token');
  const qs = new URLSearchParams({ ...params, token: WA_TOKEN }).toString();
  const res = await fetch(WA_URL + '?' + qs);
  const j = await res.json();
  if (!j.ok) throw new Error(j.error || 'web app error');
  return j;
}

async function kiteLogin() {
  try {
    const j = await waGet({ fn: 'ping' });
    if (!j.loginUrl) { alert('KITE_API_KEY not set in Script Properties.'); return; }
    const age = j.tokenTs ? 'Last token: ' + j.tokenTs + '\n\n' : '';
    if (!confirm(age + 'Open Kite login?\nAfter logging in you\'ll land on a ✅ confirmation page — then come back here and Run VTP.')) return;
    window.open(j.loginUrl, '_blank');
  } catch (e) {
    alert('Kite login failed to start: ' + e.message);
  }
}

function showLogs(lines, title) {
  document.getElementById('logtitle').textContent = title || 'Run Log';

  document.getElementById('logbody').innerHTML =
    (lines && lines.length ? lines : ['(no log lines returned)']).map(l => {
      const e = esc(l);
      if (/ERROR|FAIL|WARN/i.test(e))                                   return '<span style="color:#f87171">' + e + '</span>';
      if (/Phase \d|RESET|Executing|Daily check complete|Execution complete/i.test(e)) return '<span style="color:#60a5fa;font-weight:700">' + e + '</span>';
      if (/PLACE_|REORDER|CANCEL|DELETE_|CLOSE_|CLASSIFY|Closed trade|GTT placed/i.test(e)) return '<span style="color:#34d399">' + e + '</span>';
      return '<span style="color:#8b949e">' + e + '</span>';
    }).join('\n');

async function runVtp() {
  if (localWB) { alert('Local file mode — switch back to the sheet first (☁).'); return; }
  if (!confirm('Run the VTP daily check now?')) return;
  const btn = document.getElementById('runvtp-btn');
  btn.disabled = true; btn.textContent = '⏳ Running…';
  try {
    const j = await waPost({ fn: 'run' });
    const pend = (j.actions || []).filter(a => a.status === 'Pending').length;
    selectedRows.clear();
    showLogs(j.logs, '✅ Daily check complete — ' + pend + ' pending action(s)');

    showTab('trades');

    alert('Run failed: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '▶ Run VTP';
  }
}

const selectedRows = new Set();
function toggleRowSel(row, el) {
  if (el.checked) selectedRows.add(row); else selectedRows.delete(row);
  const bar = document.getElementById('exec-count');
  if (bar) bar.textContent = selectedRows.size + ' selected';
  const btn = document.getElementById('exec-btn');
  if (btn) btn.disabled = selectedRows.size === 0;
}

async function executeSelected() {
  if (localWB) { alert('Local file mode — execution needs the live sheet (☁).'); return; }
  if (selectedRows.size === 0) return;
  const rows = [...selectedRows];
  const verify = {}, classify = {};
  for (const a of state.actions) {
    if (!selectedRows.has(a.sheetRow)) continue;
    verify[a.sheetRow] = { action: a.action, symbol: a.symbol };
    if (a.action === 'CLASSIFY_FILL') {
      const sel = document.getElementById('cls-' + a.sheetRow);
      const v = sel ? sel.value : '';
      if (v !== 'S1' && v !== 'S2') { alert('Pick S1 or S2 for ' + a.symbol + ' first.'); return; }
      classify[a.sheetRow] = v;
    }
  }
  if (!confirm('Execute ' + rows.length + ' action(s)?\nThis places/cancels REAL GTT orders on Zerodha.')) return;
  const btn = document.getElementById('exec-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Executing…'; }
  try {
    const j = await waPost({ fn: 'execute', rows, verify, classify });
    selectedRows.clear();
    showLogs(j.logs, (j.errors ? '⚠️ ' : '✅ ') + j.executed + ' executed, ' + j.errors + ' error(s)');
    await loadData();
  } catch (e) {
    alert('Execute failed: ' + e.message);
    renderActions();
  }
}

// ── XIRR ─────────────────────────────────────────────────────────────────────
const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
// "Jul'26" / "Jul '26" / "Jul-2026" → Date(2026, 6, 1). Safari-safe.
function parseMonYY(s) {
  const m = String(s || '').trim().match(/^([A-Za-z]{3,})['’\s\-]*(\d{2,4})$/);
  if (!m) return null;
  const mo = MONTHS[m[1].slice(0, 3).toLowerCase()];
  if (mo === undefined) return null;
  let y = parseInt(m[2], 10);
  if (y < 100) y += 2000;
  return new Date(y, mo, 1);
}
function parsePortDate(s) {
  if (!s) return null;
  s = String(s).trim();
  let m = s.match(/^Date\((\d{4}),(\d+),(\d+)\)$/);
  if (m) return new Date(+m[1], +m[2], +m[3]);
  m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/);
  if (m) { const mo = MONTHS[m[2].toLowerCase()]; if (mo!==undefined) return new Date(+m[3], mo, +m[1]); }
  const n = parseFloat(s);
  if (!isNaN(n) && n > 40000) return new Date((n - 25569) * 86400 * 1000);
  return null;
}
function computeXIRR(cfs, guess=0.1) {
  if (!cfs || cfs.length < 2) return null;
  const d0 = cfs[0].date.getTime();
  const MS_YEAR = 365.25 * 24 * 3600 * 1000;
  const npv  = r => cfs.reduce((s, cf) => s + cf.amount / Math.pow(1+r, (cf.date.getTime()-d0)/MS_YEAR), 0);
  const dnpv = r => cfs.reduce((s, cf) => { const t=(cf.date.getTime()-d0)/MS_YEAR; return s - t*cf.amount/Math.pow(1+r,t+1); }, 0);
  let r = guess;
  for (let i=0; i<200; i++) { const f=npv(r),df=dnpv(r); if(Math.abs(df)<1e-12) break; const r2=r-f/df; if(Math.abs(r2-r)<1e-8) return r2; r=r2; }
  return null;
}
function s2FundPV(includeEmi) {
  const s2 = (state.fundBlock.s2 || {});
  const invested = Math.abs(s2['Currently Invested'] || state.fundBlock.invested || 0);
  const ideal    = s2['Ideal Fund Balance'] || s2['Ideal'] || state.fundBlock.ideal || 0;
  const taxProv  = s2['Tax Provision'] || s2['Tax Pending'] || state.fundBlock.taxPending || 0;
  const cashOut  = Math.abs(s2['Cash Out'] || 0);
  return invested + ideal - taxProv + (includeEmi ? 0 : cashOut);
}
function loanDate() {
  for (const r of state.s2xirr) {
    if ((r.type||'').toLowerCase() === 'loan') { const d = parsePortDate(r.date); if (d) return d; }
  }
  return new Date(2026, 5, 1);
}
function loanAmount() {
  for (const r of state.s2xirr) {
    if ((r.type||'').toLowerCase() === 'loan') return Math.abs(r.amount);
  }
  return 713000;
}
function buildCF_Net() {
  const today = new Date(); today.setHours(0,0,0,0);
  return [{ date: loanDate(), amount: -loanAmount() }, { date: today, amount: s2FundPV(true) }];
}
function buildCF_Gross() {
  const today = new Date(); today.setHours(0,0,0,0);
  return [{ date: loanDate(), amount: -loanAmount() }, { date: today, amount: s2FundPV(false) }];
}
function buildCF_Interest() {
  const cfs = [{ date: loanDate(), amount: -loanAmount() }];
  let hasInterest = false;
  for (const r of state.s2xirr) {
    if ((r.type||'').toLowerCase() !== 'emi' || r.interest == null) continue;
    const d = parsePortDate(r.date);
    if (d) { cfs.push({ date: d, amount: -Math.abs(r.interest) }); hasInterest = true; }
  }
  if (!hasInterest) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  cfs.push({ date: today, amount: s2FundPV(false) });
  cfs.sort((a,b) => a.date - b.date);
  return cfs;
}
