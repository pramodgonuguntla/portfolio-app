<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VTP Portfolio"/>
<title>VTP Portfolio</title>
<style>
  :root {
    --bg:        #0a0f1e;
    --surface:   #111827;
    --surface2:  #1a2236;
    --border:    #1e2d45;
    --accent:    #3b82f6;
    --accent2:   #10b981;
    --warn:      #f59e0b;
    --danger:    #ef4444;
    --text:      #f1f5f9;
    --muted:     #64748b;
    --s1:        #3b82f6;
    --s2:        #a855f7;
    --s0:        #f59e0b;
    --h0:        #64748b;
    --positive:  #10b981;
    --negative:  #ef4444;
    --wash:      rgba(255,255,255,0.03);   /* subtle row/section highlight */
    --wash2:     rgba(255,255,255,0.05);   /* input background */
    --inborder:  rgba(255,255,255,0.15);   /* input border */
  }
  body.light {
    --bg:        #eef1f6;
    --surface:   #ffffff;
    --surface2:  #f1f4f9;
    --border:    #d9e0ea;
    --accent:    #2563eb;
    --accent2:   #059669;
    --warn:      #b45309;
    --danger:    #dc2626;
    --text:      #0f172a;
    --muted:     #5b6b7f;
    --positive:  #059669;
    --negative:  #dc2626;
    --wash:      rgba(15,23,42,0.04);
    --wash2:     rgba(15,23,42,0.05);
    --inborder:  rgba(15,23,42,0.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; font-size: 14px; }
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #header .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  #refresh-btn, #local-btn, #runvtp-btn, #settings-btn, #kite-btn, #theme-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  #refresh-btn:active, #local-btn:active, #runvtp-btn:active, #settings-btn:active, #kite-btn:active, #theme-btn:active { opacity: 0.7; }
  #runvtp-btn:disabled { opacity: 0.5; cursor: wait; }
  .exec-bar { position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border); margin: 0 -16px -16px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .exec-bar button { flex: 1; background: var(--accent); border: none; border-radius: 8px; padding: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
  .exec-bar button:disabled { opacity: 0.5; }
  .row-check { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
  .cls-sel { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 3px 6px; font-size: 11px; }
  #local-btn.local-on { border-color: var(--accent2); color: var(--accent2); }
  #tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .big-number { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  .big-label  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .mini-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .mini-value { font-size: 16px; font-weight: 700; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .pill-s1 { background: rgba(59,130,246,0.15); color: var(--s1); }
  .pill-s2 { background: rgba(168,85,247,0.15); color: var(--s2); }
  .pill-s0 { background: rgba(245,158,11,0.15); color: var(--s0); }
  .pill-h0 { background: rgba(100,116,139,0.15); color: var(--h0); }
  .st-pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:9px; font-weight:700; }
  .st-hold { background: rgba(16,185,129,0.15);  color: #34d399; }
  .st-pq   { background: rgba(59,130,246,0.15);  color: #60a5fa; }
  .st-os   { background: rgba(168,85,247,0.15);  color: #c084fc; }
  .st-nik  { background: rgba(100,116,139,0.2);  color: #94a3b8; }
  .st-wl   { background: rgba(245,158,11,0.15);  color: #fbbf24; }
  .st-oob  { background: rgba(100,116,139,0.15); color: var(--muted); }
  .strat-card { border-radius: 10px; padding: 14px; margin-bottom: 8px; }
  .strat-card.s1 { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); }
  .strat-card.s2 { background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.2); }
  .strat-card.s0 { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); }
  .strat-card .row { display: flex; justify-content: space-between; align-items: center; }
  .strat-card .pat { font-size: 20px; font-weight: 700; }
  .strat-card .details { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .strat-card .d-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .strat-card .d-val { font-size: 12px; font-weight: 600; margin-top: 1px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { text-align: left; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .tbl td { padding: 8px; border-bottom: 1px solid rgba(30,45,69,0.5); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: var(--wash); }
  .scroll-tbl { max-height: 396px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll-tbl thead th { position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .prog-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
  .balance-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .balance-row:last-child { border-bottom: none; }
  .balance-label { font-size: 12px; color: var(--muted); }
  .balance-value { font-size: 13px; font-weight: 600; }
  .pos { color: var(--positive); }
  .neg { color: var(--negative); }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 16px; text-align: center; color: #fca5a5; font-size: 13px; line-height: 1.5; }
  .sec-head { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .sec-head .badge { font-size: 10px; background: var(--surface2); padding: 2px 7px; border-radius: 10px; color: var(--muted); font-weight: 500; }
  .trade-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .trade-row:last-child { border-bottom: none; }
  .trade-side { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 6px; }
  .buy  { background: rgba(16,185,129,0.15); color: var(--positive); }
  .sell { background: rgba(239,68,68,0.15);  color: var(--negative); }
  .trade-sym  { font-size: 13px; font-weight: 700; flex: 1; }
  .trade-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .trade-val  { text-align: right; }
  .trade-pat  { font-size: 12px; font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  #config { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; }
  #config.open { display: flex; }
  #config-box { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px; width: 100%; }
  #config-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  #config-box p  { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  #sid-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; margin-bottom: 10px; outline: none; }
  #sid-input:focus { border-color: var(--accent); }
  #save-sid { width: 100%; background: var(--accent); border: none; border-radius: 8px; padding: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
  @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
  .metric-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:12px; }
  .metric-row:last-child { border-bottom:none; }
  .metric-label { color:var(--muted); }
  .metric-value { font-weight:600; }
  .loan-hero { background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.3); border-radius:12px; padding:14px 16px; margin-bottom:10px; }
  .sub-tabs { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .sub-tab { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
  .sub-tab.active { background:rgba(59,130,246,0.15); border-color:var(--accent); color:var(--accent); }
  .inp { width:100%; max-width:100%; display:block; box-sizing:border-box; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:11px 12px; color:var(--text); font-size:14px; margin-bottom:8px; -webkit-appearance:none; appearance:none; min-height:44px; }
  .inp:focus { border-color: var(--accent); outline: none; }
  .mini-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-size:12px; font-weight:600; cursor:pointer; }
  .act-status { font-size:10px; font-weight:700; padding:3px 7px; border-radius:6px; }
  .act-pending { background: rgba(245,158,11,0.15); color:#fbbf24; }
  .act-done    { background: rgba(16,185,129,0.15); color:#34d399; }
  .act-error   { background: rgba(239,68,68,0.15);  color:#f87171; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>VTP Portfolio</h1>
      <div class="sub" id="last-updated">Loading…</div>
    </div>
    <div style="display:flex;gap:8px">
      <button id="kite-btn" onclick="kiteLogin()" title="Refresh Kite token">🔑</button>
      <button id="runvtp-btn" onclick="runVtp()" title="Run VTP" style="border-color:rgba(16,185,129,0.5);color:var(--accent2)">▶</button>
      <button id="refresh-btn" onclick="loadData()">↻</button>
      <button id="theme-btn" onclick="toggleTheme()" title="Light / dark theme">☾</button>
      <button id="settings-btn" onclick="document.getElementById('config').classList.add('open')">⚙</button>
    </div>
  </div>
  <div id="tabs">
    <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="tab" onclick="showTab('ps2')">Progress S2</div>
    <div class="tab" onclick="showTab('ps1')">Progress S1</div>
    <div class="tab" onclick="showTab('prospects')">S2 Prospects</div>
    <div class="tab" onclick="showTab('open')">Open Positions</div>
    <div class="tab" onclick="showTab('closed')">Closed Positions</div>
    <div class="tab" onclick="showTab('trades')">Actions</div>
  </div>
  <div id="content">
    <div id="loading"><div class="spinner"></div><span>Loading portfolio…</span></div>
  </div>
</div>
<div id="logmodal" style="display:none;position:fixed;inset:0;background:rgba(3,7,18,0.96);z-index:200;flex-direction:column">
  <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
    <b id="logtitle" style="font-size:14px">Run Log</b>
    <button onclick="document.getElementById('logmodal').style.display='none'"
      style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer">✕ Close</button>
  </div>
  <pre id="logbody" style="flex:1;overflow:auto;margin:0;padding:14px 16px;font-size:10.5px;line-height:1.7;color:#c9d1d9;white-space:pre-wrap;-webkit-overflow-scrolling:touch"></pre>
</div>
<div id="config">
  <div id="config-box">
    <h3>Settings</h3>
    <p>Sheet ID for reading (sheet must be viewable via link). Web App URL + token enable Run VTP and action execution from this app.</p>
    <input id="sid-input" placeholder="Spreadsheet ID (from URL)" />
    <input id="wa-url-input" placeholder="GAS Web App URL (…/exec)" />
    <input id="wa-token-input" placeholder="Web App token" />
    <button id="save-sid" onclick="saveSettings()">Save & Load</button>
  </div>
</div>
<script>
// ── Config ───────────────────────────────────────────────────────────────────
// Points to the VTP GAS sheet ("My Equity" — same sheet as the daily runner)
// Data model version: repo-2026-07-04 (15-col VTP_Repo, lowercase statuses)
const DEFAULT_SHEET_ID = '131zCFolNvpwyvNqWRI5bL9BJmZNUhLfVu1Ypy7XOvUg';
const DEFAULT_WA_URL   = 'https://script.google.com/macros/s/AKfycbxYxiBuyPNS19E20X25auKmC7ykJToiIBELyl6_-J5_3irLaGF_l_Aof2z2e0pZsSEB0g/exec';
// Token is NEVER hardcoded — set it once via ⚙ (stored in this device's localStorage)
let SHEET_ID = localStorage.getItem('vtp_sheet_id') || DEFAULT_SHEET_ID;
let WA_URL   = localStorage.getItem('vtp_wa_url')   || DEFAULT_WA_URL;
let WA_TOKEN = localStorage.getItem('vtp_wa_token') || '';

// ── State ────────────────────────────────────────────────────────────────────
let state = { repo: [], open: [], closed: [], summary: [], fundBlock: {}, progress1: [], progress2: [], s2xirr: [], actions: [], loaded: false };
let currentTab = 'dashboard';
let progressSubTab = 's1';
let positionsCat = localStorage.getItem('vtp_pos_cat') || 'held';

// ── Theme (default light; remembered per device) ──────────────────────────────
function applyTheme(t) {
  document.body.classList.toggle('light', t === 'light');
  localStorage.setItem('vtp_theme', t);
  const b = document.getElementById('theme-btn');
  if (b) b.textContent = t === 'light' ? '☾' : '☀';
}
function toggleTheme() { applyTheme(document.body.classList.contains('light') ? 'dark' : 'light'); }
applyTheme(localStorage.getItem('vtp_theme') || 'light');

// Repo status buckets
const HELD_STATUSES = new Set(['in_holdings', 'prior_quarter', 'other_strategy', 'not_in_kite']);
const WL_STATUSES   = new Set(['alerted', 'gtt_placed']);

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => {
  if (n === null || n === undefined || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return n;
  return (num >= 0 ? '' : '-') + '₹' + Math.abs(num).toLocaleString('en-IN', {maximumFractionDigits: 0});
};
const fmtP = n => (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
// compact ₹ for dense tables: 1,34,860 → 1.3L · 15,789 → 16k · 890 → 890
const fmtC = v => {
  const a = Math.abs(v), s = v < 0 ? '−' : '';
  if (a >= 1e5)  return s + (a / 1e5).toFixed(a >= 1e7 ? 0 : 1) + 'L';
  if (a >= 1000) return s + Math.round(a / 1000).toLocaleString('en-IN') + 'k';
  return s + Math.round(a);
};
// full value, Indian grouping, no ₹ (dense labels): −12,92,753
const fmtF = v => (v < 0 ? '−' : '') + Math.abs(Math.round(v)).toLocaleString('en-IN');
const fmtN = n => {
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return (num >= 0 ? '+' : '') + '₹' + num.toLocaleString('en-IN', {maximumFractionDigits: 0});
};
const cls  = n => parseFloat(n) >= 0 ? 'pos' : 'neg';
const pill = s => `<span class="pill pill-${(s||'').toLowerCase()}">${s||'—'}</span>`;
// Strip Indian-format commas before parsing numbers (e.g. "-7,13,000" → -713000)
function parseAmt(v) { return v == null ? 0 : parseFloat(String(v).replace(/,/g, '')) || 0; }

// Cell helpers for positional rows ({v, f} gviz cells)
const val  = c => (c == null) ? null : (c.v != null ? c.v : c.f);
const disp = c => (c == null) ? ''   : (c.f != null ? c.f : (c.v != null ? c.v : ''));

function statusPill(st) {
  const MAP = {
    in_holdings:   ['st-hold', 'HOLDING'],
    prior_quarter: ['st-pq',   'PRIOR QTR'],
    other_strategy:['st-os',   'HELD'],
    not_in_kite:   ['st-nik',  'NOT IN KITE'],
    gtt_placed:    ['st-wl',   'GTT PLACED'],
    alerted:       ['st-wl',   'ALERTED'],
    out_of_budget: ['st-oob',  'OOB'],
  };
  const [c, label] = MAP[st] || ['st-oob', (st||'—').toUpperCase()];
  return `<span class="st-pill ${c}">${label}</span>`;
}

// Local-file testing mode removed 2026-07-07 — localWB kept as a constant so
// the guards below stay inert (always live-sheet mode).
const localWB = null;

// ── Sheets API ────────────────────────────────────────────────────────────────
// Label-keyed rows (for sheets with unique headers: Yearly Summary, Progress…)
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`Failed to fetch ${sheetName}: HTTP ${res.status}`);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?$/, ''));
  if (!json.table || !json.table.rows) return [];
  const cols = json.table.cols.map((c, i) => (c.label || '').trim() || `col${i}`);
  return json.table.rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => { obj[c] = r.c[i] ? (r.c[i].v !== null ? r.c[i].v : r.c[i].f) : null; });
    return obj;
  });
}

// Positional rows (VTP_Repo, Closed Trades, Actions) — immune to duplicate
// header labels (Closed Trades has Qty/Price/Value/Charge twice: buy + sell)
async function fetchSheetRows(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`Failed to fetch ${sheetName}: HTTP ${res.status}`);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?$/, ''));
  if (!json.table || !json.table.rows) return [];
  return json.table.rows.map(r => r.c || []);
}

// ── Parse Yearly Summary ──────────────────────────────────────────────────────
function parseSummary(rows) {
  const summary = [];
  const fund    = { byStrategy: {}, s2: {}, s1: {}, s0: {} };
  const FUND_LABELS = ['S1 PAT','S2 PAT','S0 PAT','H0 PAT','Funds Input','Currently Invested',
       'Tax Pending','Tax Provision','Ideal Fund Balance','Actual Balance','Actual Fund Balance',
       'Cash Out','Booked Funds','Floating Funds','Charges Till Date','PAT'];
  for (const row of rows) {
    const keys = Object.keys(row);
    const colA = row['FY']         != null ? row['FY']         : row[keys[0]];
    const colB = row['Strategy']   != null ? row['Strategy']   : row[keys[1]];
    const colC = row['Lots']       != null ? row['Lots']       : row[keys[2]];
    const colF = row['Sell Value'] != null ? row['Sell Value'] : row[keys[5]];

    if (colA && String(colA).startsWith('FY')) {
      const pat  = parseFloat(row['PAT'])        || 0;
      const pbt  = parseFloat(row['PBT'])        || 0;
      const tax  = parseFloat(row['Tax'])        || 0;
      const lots = parseFloat(colC)              || 0;
      const bv   = parseFloat(row['Buy Value'])  || 0;
      const sv   = parseFloat(colF)              || 0;
      const ebit = parseFloat(row['EBIT'])       || 0;
      summary.push({ fy: colA, strategy: colB, lots, buyValue: bv, sellValue: sv, ebit, pbt, tax, pat });
    }

    const isBlankA = colA == null || String(colA).trim() === '';
    const label = String(isBlankA ? (colB || '') : '').trim();
    if (label && FUND_LABELS.some(k => label.includes(k))) {
      const colD   = row['Buy Value']   != null ? row['Buy Value']   : row[keys[3]];   // S1 column
      const colE   = row['Buy Charges'] != null ? row['Buy Charges'] : row[keys[4]];   // S0 column
      const s2val  = parseFloat(colC) || 0;
      const totval = parseFloat(colF) || s2val;
      fund.s2[label]           = s2val;
      fund.s1[label]           = parseFloat(colD) || 0;
      fund.s0[label]           = parseFloat(colE) || 0;
      fund.byStrategy[label]   = totval;
      if (label.includes('Funds Input'))        fund.fundsInput = totval;
      if (label.includes('Ideal'))              fund.ideal      = totval;
      if (label.includes('Actual Fund Balance'))fund.actual     = totval;
      if (label.includes('Currently Invested')) fund.invested   = s2val;
      if (label.includes('Tax Pending') || label.includes('Tax Provision')) fund.taxPending = s2val;
    }
  }
  return { summary, fund };
}

// ── Snapshot cache ────────────────────────────────────────────────────────────
// Persist the fully-parsed state so the app opens instantly from the last
// snapshot. The sheet is only fetched on ↻ refresh (or a device's first open).
const CACHE_KEY = 'vtp_cache';
function saveCache(ts) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts, state })); }
  catch (e) { console.warn('[VTP] cache save failed:', e.message); }
}
function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    const c = JSON.parse(raw);
    if (!c || !c.state || !c.state.loaded) return false;
    state = c.state;
    const t = new Date(c.ts);
    const sameDay = t.toDateString() === new Date().toDateString();
    document.getElementById('last-updated').textContent =
      'Cached · ' + (sameDay
        ? t.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})
        : t.toLocaleDateString('en-IN', {day:'2-digit', month:'short'})
          + ' ' + t.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}));
    renderTab(currentTab);
    return true;
  } catch (e) { console.warn('[VTP] cache load failed:', e.message); return false; }
}

// ── Load all data ─────────────────────────────────────────────────────────────
async function loadData() {
  setContent('<div id="loading"><div class="spinner"></div><span>Loading portfolio…</span></div>');
  document.getElementById('last-updated').textContent = 'Refreshing…';
  try {
    const [repoRows, closedRows, summaryRows, prog1RawA, prog1RawB, actionRows, prog2Rows, s2xirrRows, prospectRows] = await Promise.all([
      fetchSheetRows('VTP_Repo'),
      fetchSheetRows('Closed Trades'),
      fetchSheet('Yearly Summary').catch(() => []),
      fetchSheetRows('Progress_S1').catch(() => []),
      fetchSheetRows('Progress S1').catch(() => []),
      fetchSheetRows('Actions').catch(() => []),
      fetchSheet('Progress_S2').catch(() => []),
      fetchSheet('S2_XIRR').catch(() => []),
      fetchSheetRows('S2_Prospects').catch(() => []),
    ]);
    const prog1Rows = (prog1RawA && prog1RawA.length > 0) ? prog1RawA : prog1RawB;

    // ── VTP_Repo — 15 cols A–O (positional) ───────────────────────────────────
    // Ref | Ticker | Status | Strategy | Trigger | Value Price | Ideal Qty |
    // Lot Size | Buy Date | Qty | Price | Value | Charge | Buy GTT | Sell GTT
    state.repo = repoRows
      .filter(r => val(r[1]) && String(val(r[1])).trim() !== '' && String(val(r[1])).trim() !== 'Ticker')
      .map(r => ({
        ref:        String(disp(r[0]) || '').replace(/\.0$/, ''),
        ticker:     String(val(r[1])).trim(),
        status:     String(val(r[2]) || '').trim(),
        strategy:   String(val(r[3]) || '').trim(),
        trigger:    parseAmt(val(r[4])),
        valuePrice: parseAmt(val(r[5])),
        idealQty:   parseAmt(val(r[6])),
        buyDate:    disp(r[8]),
        qty:        parseAmt(val(r[9])),
        price:      parseAmt(val(r[10])),
        value:      parseAmt(val(r[11])),
        charge:     parseAmt(val(r[12])),
        buyGtt:     String(disp(r[13]) || ''),
        sellGtt:    String(disp(r[14]) || ''),
      }));
    state.open = state.repo.filter(r => HELD_STATUSES.has(r.status));

    // ── Closed Trades — 21 cols (positional; duplicate buy/sell headers) ──────
    state.closed = closedRows
      .filter(r => val(r[2]) && String(val(r[2])).trim() !== '' && String(val(r[2])).trim() !== 'Scrip')
      .map(r => ({
        ref:       String(disp(r[0]) || '').replace(/\.0$/, ''),
        buyDate:   disp(r[1]),
        scrip:     String(val(r[2])).trim(),
        qty:       parseAmt(val(r[3])),
        buyPrice:  parseAmt(val(r[4])),
        buyValue:  parseAmt(val(r[5])),
        sellDate:  disp(r[7]),
        sellQty:   parseAmt(val(r[8])),
        sellPrice: parseAmt(val(r[9])),
        sellValue: parseAmt(val(r[10])),
        ebit:      parseAmt(val(r[12])),
        pbt:       parseAmt(val(r[14])),
        tax:       parseAmt(val(r[15])),
        pat:       parseAmt(val(r[16])),
        strategy:  String(val(r[18]) || '').trim(),
        fy:        String(val(r[19]) || '').trim(),
      }));

    // ── Actions sheet — pending / done / error rows ───────────────────────────
    const ACTION_TYPES = new Set(['PLACE_BUY_GTT','PLACE_SELL_GTT','REORDER_BUY_GTT','CANCEL_GTT',
      'ADD_S0_ROW','ADD_S2_ROW','ADD_ORPHAN_REPO_ROW','DELETE_S1_ROW','DELETE_S2_ROW',
      'CLOSE_LOT','CLASSIFY_FILL','QUARTERLY_RESET','NEEDS_ATTENTION']);
    // sheetRow: gviz headers=1 consumes the title row, so data index 0 = sheet row 2
    state.actions = (actionRows || [])
      .map((r, i) => ({ r, sheetRow: i + 2 }))
      .filter(x => ACTION_TYPES.has(String(val(x.r[1]) || '').trim()))
      .map(x => ({
        sheetRow: x.sheetRow,
        action:   String(val(x.r[1])).trim(),
        symbol:   String(val(x.r[2]) || '').trim(),
        strategy: String(val(x.r[3]) || '').trim(),
        details:  String(val(x.r[4]) || '').trim(),
        recPrice: disp(x.r[5]),
        recQty:   disp(x.r[6]),
        status:   String(val(x.r[9]) || 'Pending').trim(),
      }));
    // Run date from the title cell if visible in any row
    const titleRow = (actionRows || []).find(r => String(val(r[0]) || '').includes('VTP Daily Check'));
    state.actionsTitle = titleRow ? String(val(titleRow[0])) : '';

    // Authoritative row numbers from the web app — gviz drops the merged title
    // row, so its derived indexes can be off by one (MAPMYINDIA row-5 mismatch).
    // Execution needs the web app anyway, so its list wins when available.
    if (WA_URL && !localWB) {
      try {
        const j = await waGet({ fn: 'actions' });
        state.actions = (j.actions || []).map(a => ({
          sheetRow: a.row,
          action:   a.action,
          symbol:   a.symbol,
          strategy: a.strategy,
          details:  a.details,
          recPrice: a.recPrice != null ? a.recPrice : '',
          recQty:   a.recQty   != null ? a.recQty   : '',
          status:   a.status || 'Pending',
        }));
      } catch (e) {
        console.warn('[VTP] web app actions fetch failed — falling back to gviz rows:', e.message);
      }
    }

    // ── Yearly Summary ────────────────────────────────────────────────────────
    const { summary, fund } = parseSummary(summaryRows);
    state.summary   = summary;
    state.fundBlock = fund;

    // ── Progress S1 (positional) ──────────────────────────────────────────────
    // Table 1 (A–M): lot matrix — #, Month, Inv, slots 1..10 ("Booked" marks)
    // Table 2 (O–Q): booking projection — Label (Consol FY / month), Bookings, Cum
    state.prog1Lots = (prog1Rows || []).filter(r => {
      const m = String(val(r[1]) || '').trim();
      return m !== '' && m !== 'Month';
    }).map(r => ({
      num:   val(r[0]),
      month: String(val(r[1])).trim(),
      inv:   parseAmt(val(r[2])),
      slots: Array.from({length: 10}, (_, i) => String(val(r[3 + i]) ?? '').trim()),
    }));
    // Locate the booking-projection table by finding the "Consol …" label
    // column (currently P; auto-detects if columns shift)
    let bookCol = -1;
    for (const r of (prog1Rows || [])) {
      for (let c = 12; c <= 22; c++) {
        if (/^consol/i.test(String(val(r[c]) || '').trim())) { bookCol = c; break; }
      }
      if (bookCol >= 0) break;
    }
    state.prog1Book = bookCol < 0 ? [] :
      (prog1Rows || []).filter(r => String(val(r[bookCol]) || '').trim() !== '')
        .map(r => ({
          label: String(val(r[bookCol])).trim(),
          cnt:   parseAmt(val(r[bookCol + 1])),
          cum:   parseAmt(val(r[bookCol + 2])),
        }));

    // ── Progress S2 ───────────────────────────────────────────────────────────
    state.progress2 = (prog2Rows || []).filter(r => {
      const keys = Object.keys(r);
      const month = r[keys[1]];
      return month && String(month).trim() !== '' && String(month) !== 'Month';
    }).map(r => {
      const keys = Object.keys(r);
      return { num: r[keys[0]], month: r[keys[1]], target: parseFloat(r[keys[2]])||0,
               actual: parseFloat(r[keys[3]])||0, cum_target: parseFloat(r[keys[4]])||0,
               cum_actual: parseFloat(r[keys[5]])||0 };
    });

    // ── S2_XIRR ───────────────────────────────────────────────────────────────
    state.s2xirr = (s2xirrRows || []).filter(r => {
      const keys = Object.keys(r);
      const t = [r['Type'], r[keys[4]], r[keys[2]]].find(v => v === 'Loan' || v === 'EMI');
      return !!t;
    }).map(r => {
      const keys = Object.keys(r);
      const type = [r['Type'], r[keys[4]], r[keys[2]]].find(v => v === 'Loan' || v === 'EMI');
      const isEMI = type === 'EMI';
      return {
        date:      r['Date'] || r[keys[0]],
        amount:    parseAmt(r['Total EMI'] || r['Amount'] || r[keys[1]]),
        principal: isEMI ? (parseAmt(r['Principal'] || r[keys[2]]) || null) : null,
        interest:  isEMI ? (parseAmt(r['Interest']  || r[keys[3]]) || null) : null,
        type,
      };
    }).filter(r => r.amount !== 0);

    // ── S2 Prospects (positional): WL Ref | Ticker | CMP | Trigger | Away% | Qty | ~Value | Held? | Updated
    // NOTE: gviz silently serves the FIRST sheet when the requested tab doesn't
    // exist (e.g. before the first run creates S2_Prospects) — validate shape
    // (positive CMP/trigger/away) so foreign rows can never render here.
    state.prospects = (prospectRows || [])
      .filter(r => val(r[1]) && String(val(r[1])).trim() !== 'Ticker' &&
                   parseAmt(val(r[2])) > 0 && parseAmt(val(r[3])) > 0 && parseAmt(val(r[4])) > 0)
      .map(r => ({
        ref:     String(disp(r[0]) || ''),
        ticker:  String(val(r[1])).trim(),
        cmp:     parseAmt(val(r[2])),
        trigger: parseAmt(val(r[3])),
        away:    parseAmt(val(r[4])),
        qty:     parseAmt(val(r[5])),
        value:   parseAmt(val(r[6])),
        held:    String(val(r[7]) || '').trim() === 'YES',
        updated: disp(r[8]),
      }));

    // ── Live Kite funds (best-effort; token may be expired) ───────────────────
    state.funds = null;
    if (WA_URL && !localWB) {
      try { state.funds = (await waGet({ fn: 'funds' })).funds || null; }
      catch (e) { console.warn('[VTP] funds fetch failed:', e.message); }
    }

    console.log('[VTP] repo rows:', state.repo.length, 'held:', state.open.length);
    console.log('[VTP] closed:', state.closed.length, 'actions:', state.actions.length);

    state.loaded = true;
    const nowTs = Date.now();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date(nowTs).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    saveCache(nowTs);
    renderTab(currentTab);

  } catch (e) {
    setContent(`<div class="error-box">Failed to load data.<br><br>${e.message}<br><br>
      Make sure the sheet is public (Share → Anyone with link → Viewer).<br><br>
      <button onclick="document.getElementById('config').classList.add('open')"
        style="margin-top:10px;padding:8px 16px;background:var(--accent);border:none;border-radius:8px;color:white;font-size:13px;cursor:pointer;">
        Change Sheet ID
      </button></div>`);
    document.getElementById('last-updated').textContent = 'Failed to load';
  }
}

// ── Tab routing ───────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabs = ['dashboard','ps2','ps1','prospects','open','closed','trades'];
  document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
  if (state.loaded) renderTab(tab);
}
function renderTab(tab) {
  if      (tab === 'dashboard') renderDashboard();
  else if (tab === 'ps2')       renderProgressS2();
  else if (tab === 'ps1')       renderProgressS1();
  else if (tab === 'prospects') renderProspects();
  else if (tab === 'open')      renderPositions();
  else if (tab === 'closed')    renderClosed();
  else if (tab === 'trades')    renderActions();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
// Total PAT card (S1/S2/S0 + last-3-FY breakup) · Total Invested · Cash Balance · Funds · Actions
// S1/S2 sub-cards navigate to Progress tabs; tapping an FY expands its strategy breakdown
let dashFY = null;
function toggleDashFY(fy) { dashFY = dashFY === fy ? null : fy; renderDashboard(); }

function renderDashboard() {
  const fys = [...new Set(state.summary.map(r => r.fy))].sort().reverse();

  const totalPAT = state.summary.reduce((a, r) => a + r.pat, 0);
  const cash     = state.fundBlock.actual || 0;

  const pendingActs = state.actions.filter(a => a.status === 'Pending');
  const errorActs   = state.actions.filter(a => a.status.startsWith('ERROR'));

  // ── Funds overview — Yearly Summary fund block as a waterfall + strategy cards
  const fb = state.fundBlock;
  const fv = (m, l) => (m || {})[l] || 0;
  const fundsIn  = fb.fundsInput || 0;
  const patAll   = fv(fb.byStrategy, 'PAT');
  const investedAll = fv(fb.byStrategy, 'Currently Invested');   // negative
  const taxProv  = fv(fb.byStrategy, 'Tax Provision');
  const cashOut  = fv(fb.byStrategy, 'Cash Out');                // negative
  const idealBal = fv(fb.byStrategy, 'Ideal Fund Balance');
  const actualBal = fb.actual || 0;

  let fundsCard = '';
  if (fundsIn > 0) {
    // Flow: input + PAT − holdings + tax provision − cash out = ideal · ideal − actual = charges
    const fSub = 'background:var(--wash);border-color:var(--inborder);padding:8px 6px;min-width:0';
    const flow = [
      { l: 'PAT earned',    v: patAll,      c: 'var(--positive)' },
      { l: 'In holdings',   v: investedAll, c: 'var(--negative)' },
      { l: 'Tax provision', v: taxProv,     c: taxProv < 0 ? 'var(--negative)' : 'var(--positive)' },
      { l: 'Cash out',      v: cashOut,     c: 'var(--negative)' },
      { l: 'Ideal balance', v: idealBal,    c: 'var(--accent)' },
      { l: 'Actual balance',v: actualBal,   c: 'var(--accent)' },
    ];
    const fCell = f => `
      <div class="mini-card" style="${fSub}">
        <div class="mini-label" style="font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.l}</div>
        <div style="font-size:12px;font-weight:700;color:${f.c}">${fmtF(Math.abs(f.v))}</div>
      </div>`;
    const fArrow = '<span style="color:var(--muted);font-size:12px;font-weight:700;text-align:center">→</span>';
    const fRow = cells => `
      <div style="display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:4px;align-items:center;margin-top:6px">
        ${cells.map(fCell).join(fArrow)}
      </div>`;
    const flowCards = fRow(flow.slice(0, 3)) + fRow(flow.slice(3, 6));

    // Per-strategy funds — one compact table (label col + S2/S1/S0 cols), no horizontal overflow
    const mFor = s => s === 'S2' ? fb.s2 : s === 'S1' ? fb.s1 : fb.s0;
    const strats = ['S2', 'S1', 'S0'].filter(s => { const m = mFor(s); return m && (fv(m, 'Booked Funds') || fv(m, 'PAT')); });
    const sfRows = [
      ['Booked',   'Booked Funds'],
      ['Floating', 'Floating Funds'],
      ['PAT',      'PAT'],
      ['Holding',  'Currently Invested'],
      ['Ideal',    'Ideal Fund Balance'],
    ].filter(([, key]) => strats.some(s => fv(mFor(s), key)));
    const sfColor = (lbl, v) => v < 0 ? 'var(--negative)' : lbl === 'PAT' ? 'var(--positive)' : 'inherit';
    const stratFunds = strats.length ? `
      <div class="card" style="padding:12px 14px">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr><td></td>${strats.map(s => `<td style="text-align:right;padding:2px 0 6px">${pill(s)}</td>`).join('')}</tr>
          ${sfRows.map(([lbl, key]) => `
          <tr>
            <td style="color:var(--muted);padding:3px 0">${lbl}</td>
            ${strats.map(s => { const v = fv(mFor(s), key); return `
            <td style="text-align:right;padding:3px 0 3px 8px;font-weight:${lbl === 'Ideal' ? 700 : 600};color:${sfColor(lbl, v)}">${v ? fmtF(Math.abs(v)) : '—'}</td>`; }).join('')}
          </tr>`).join('')}
        </table>
      </div>` : '';

    fundsCard = `
      <div class="sec-head" style="margin-top:14px">Funds</div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="mini-label">Funds Input</div>
          <div style="font-size:10px;color:var(--muted)">booked ${fmtF(fv(fb.byStrategy, 'Booked Funds'))} + floating ${fmtF(fv(fb.byStrategy, 'Floating Funds'))}</div>
        </div>
        <div class="mini-value" style="font-size:26px;margin:2px 0 10px">${fmtF(fundsIn)}</div>
        ${flowCards}
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:8px">
          <span>Charges till date: <b style="color:var(--warn)">${fmtF(idealBal - actualBal)}</b> (ideal − actual)</span>
        </div>
      </div>
      ${stratFunds}`;
  }

  // Total PAT breakups — last three FYs + all-time per strategy
  const last3 = fys.slice(0, 3);
  const fyAgg = fy => {
    const rows = state.summary.filter(r => r.fy === fy);
    return { pat: rows.reduce((a,r) => a + r.pat, 0), lots: rows.reduce((a,r) => a + r.lots, 0) };
  };
  const stratPat = s => state.summary.filter(r => r.strategy === s).reduce((a,r) => a + r.pat, 0);
  const subCard = 'background:var(--wash);border-color:var(--inborder)';
  if (dashFY && !fys.includes(dashFY)) dashFY = null;

  // Expanded strategy breakdown for tapped FY
  const fyBreakdown = !dashFY ? '' : (() => {
    const cards = ['S1','S2','S0'].map(s => {
      const rows = state.summary.filter(r => r.fy === dashFY && r.strategy === s);
      if (rows.length === 0) return '';
      const pat  = rows.reduce((a,r) => a + r.pat, 0);
      const lots = rows.reduce((a,r) => a + r.lots, 0);
      const ebit = rows.reduce((a,r) => a + r.ebit, 0);
      const tax  = rows.reduce((a,r) => a + r.tax, 0);
      return `
      <div class="strat-card ${s.toLowerCase()}" style="margin-bottom:6px">
        <div class="row">${pill(s)}<span class="pat ${cls(pat)}">${fmt(pat)}</span></div>
        <div class="details">
          <div class="d-item"><div class="d-label">Lots</div><div class="d-val">${lots}</div></div>
          <div class="d-item"><div class="d-label">EBIT</div><div class="d-val ${cls(ebit)}">${fmt(ebit)}</div></div>
          <div class="d-item"><div class="d-label">Tax</div><div class="d-val neg">${fmt(tax)}</div></div>
        </div>
      </div>`;
    }).join('');
    return `<div style="margin-top:8px">${cards || `<div style="font-size:11px;color:var(--muted);text-align:center;padding:6px 0">No closed lots in ${dashFY}</div>`}</div>`;
  })();

  setContent(`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="mini-label">Total PAT</div>
        <div style="font-size:10px;color:var(--muted)">all time</div>
      </div>
      <div class="mini-value ${cls(totalPAT)}" style="font-size:26px;margin:2px 0 10px">${fmt(totalPAT)}</div>
      <div class="grid-3" style="margin-bottom:0">
        ${['S1','S2','S0'].map(s => { const p = stratPat(s);
          const nav = s === 'S1' ? 'ps1' : s === 'S2' ? 'ps2' : '';
          return `
        <div class="mini-card" style="${subCard}${nav ? ';cursor:pointer' : ''}" ${nav ? `onclick="showTab('${nav}')"` : ''}>
          <div style="margin-bottom:4px">${pill(s)}${nav ? ' <span style="font-size:9px;color:var(--muted)">›</span>' : ''}</div>
          <div class="mini-value ${cls(p)}" style="font-size:14px">${fmt(p)}</div>
        </div>`; }).join('')}
      </div>
      ${last3.length ? `
      <div class="grid-3" style="margin:8px 0 0">
        ${last3.map(fy => { const a = fyAgg(fy); const active = fy === dashFY; return `
        <div class="mini-card" style="${active ? 'background:rgba(59,130,246,0.08);border-color:var(--accent)' : subCard};cursor:pointer" onclick="toggleDashFY('${fy}')">
          <div class="mini-label" ${active ? 'style="color:var(--accent)"' : ''}>${fy}</div>
          <div class="mini-value ${cls(a.pat)}" style="font-size:14px">${fmt(a.pat)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">${a.lots} lots</div>
        </div>`; }).join('')}
      </div>` : ''}
      ${fyBreakdown}
    </div>
    <div class="card">
      <div class="card-title">Cash Balance</div>
      ${state.funds && state.funds.live != null ? `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
        <div>
          <div class="big-number ${cls(state.funds.live)}" style="font-size:26px">${fmt(state.funds.live)}</div>

// ── Positions (full repo, category filter) ────────────────────────────────────
const POS_CATS = [
  { id:'held', label:'All Held',    test: r => HELD_STATUSES.has(r.status) },
  { id:'s1',   label:'S1',          test: r => r.strategy === 'S1' && (r.status === 'in_holdings' || r.status === 'prior_quarter') },
  { id:'hold', label:'Holdings',    test: r => r.status === 'in_holdings' },
  { id:'pq',   label:'Prior Qtr',   test: r => r.status === 'prior_quarter' },
  { id:'s2',   label:'S2',          test: r => r.status === 'other_strategy' && r.strategy === 'S2' },
  { id:'s0',   label:'S0',          test: r => r.status === 'other_strategy' && r.strategy === 'S0' },
  { id:'nik',  label:'Not in Kite', test: r => r.status === 'not_in_kite' },
  { id:'wl',   label:'Watchlist',   test: r => WL_STATUSES.has(r.status) },
  { id:'oob',  label:'OOB',         test: r => r.status === 'out_of_budget' },
];

function setPosCat(id) {
  positionsCat = id;
  localStorage.setItem('vtp_pos_cat', id);
  renderPositions();
}

// Strategy filter (ANDs with category / FY) — multi-select toggle chips.
// Tap chips to combine (e.g. S1+S0 = everything except S2); empty selection = All.
let posStratSet    = new Set((localStorage.getItem('vtp_pos_strat') || '').split(',').filter(s => /^S[012]$/.test(s)));
let closedStratSet = new Set();
const stratMatch = (sel, r) => sel.size === 0 || sel.has(r.strategy);
function togglePosStrat(s) {
  if (s === 'all') posStratSet.clear();
  else posStratSet.has(s) ? posStratSet.delete(s) : posStratSet.add(s);
  localStorage.setItem('vtp_pos_strat', [...posStratSet].join(','));
  renderPositions();
}
function toggleClosedStrat(s) {
  if (s === 'all') closedStratSet.clear();
  else closedStratSet.has(s) ? closedStratSet.delete(s) : closedStratSet.add(s);
  renderClosed(currentClosedFY);
}
function stratChips(sel, fnName, rows) {
  const chip = (id, label, active, n) =>
    `<div class="sub-tab ${active ? 'active' : ''}" onclick="${fnName}('${id}')">${label} <span style="opacity:0.6">${n}</span></div>`;
  return `<div class="sub-tabs">
    ${chip('all', 'All', sel.size === 0, rows.length)}
    ${['S1', 'S2', 'S0'].map(s => chip(s, s, sel.has(s), rows.filter(r => r.strategy === s).length)).join('')}
  </div>`;
}

// ── Table sorting ─────────────────────────────────────────────────────────────
let posSort    = { key: 'value',    dir: -1 };
let closedSort = { key: 'sellDate', dir: -1 };
let currentClosedFY = null;

function sortRows(arr, key, dir, getters) {
  const g = getters[key] || (r => r[key]);
  return [...arr].sort((a, b) => {
    const va = g(a), vb = g(b);
    if (typeof va === 'string' || typeof vb === 'string')
      return String(va || '').localeCompare(String(vb || ''), undefined, { numeric: true }) * dir;
    return ((va || 0) - (vb || 0)) * dir;
  });
}
function th(label, key, cur, fnName, align) {
  const arrow = cur.key === key ? (cur.dir === 1 ? ' ▲' : ' ▼') : '';
  return `<th style="cursor:pointer;user-select:none;${align ? 'text-align:' + align : ''}" onclick="${fnName}('${key}')">${label}${arrow}</th>`;
}
function setPosSort(key)    { posSort    = posSort.key    === key ? { key, dir: -posSort.dir }    : { key, dir: -1 }; renderPositions(); }
function setClosedSort(key) { closedSort = closedSort.key === key ? { key, dir: -closedSort.dir } : { key, dir: -1 }; renderClosed(currentClosedFY); }

const dateVal = s => { const d = parsePortDate(s); return d ? d.getTime() : 0; };

function renderPositions() {
  const cat     = POS_CATS.find(c => c.id === positionsCat) || POS_CATS[0];
  const catRows = state.repo.filter(cat.test);
  const rows    = catRows.filter(r => stratMatch(posStratSet, r));
  const isWatch = cat.id === 'wl' || cat.id === 'oob';

  const chips = `<div class="sub-tabs">${POS_CATS.map(c => {
    const n = state.repo.filter(c.test).length;
    return `<div class="sub-tab ${c.id===positionsCat?'active':''}" onclick="setPosCat('${c.id}')">${c.label} <span style="opacity:0.6">${n}</span></div>`;
  }).join('')}</div>` + stratChips(posStratSet, 'togglePosStrat', catRows);

  if (rows.length === 0) {
    setContent(`${chips}<div class="card" style="text-align:center;padding:32px;color:var(--muted)">No rows in this category.</div>`);
    return;
  }

  if (isWatch) {
    // Watchlist / OOB — show trigger & value price
    const WATCH_KEYS = ['ticker','trigger','valuePrice','idealQty'];
    const sk  = WATCH_KEYS.includes(posSort.key) ? posSort : { key: 'ticker', dir: 1 };
    const sorted = sortRows(rows, sk.key, sk.dir, { ticker: r => r.ticker });
    setContent(`${chips}
      <div class="sec-head">${cat.label} <span class="badge">${sorted.length}</span></div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="tbl">
          <thead><tr>
            ${th('Scrip','ticker',sk,'setPosSort')}
            ${th('Trigger','trigger',sk,'setPosSort')}
            ${th('Value Px','valuePrice',sk,'setPosSort')}
            ${th('Qty · ~Lot','idealQty',sk,'setPosSort','right')}
          </tr></thead>
          <tbody>
            ${sorted.map(r => `
              <tr>
                <td><div style="font-weight:600">${r.ticker}</div><div style="font-size:10px;margin-top:1px">${statusPill(r.status)} <span style="color:var(--muted)">${r.ref}</span></div></td>
                <td>${r.trigger ? '₹' + r.trigger.toLocaleString('en-IN') : '—'}</td>
                <td>${r.valuePrice ? '₹' + r.valuePrice.toLocaleString('en-IN') : '—'}</td>
                <td style="text-align:right">${r.idealQty || '—'}${r.idealQty && r.valuePrice ? `<div style="font-size:10px;color:var(--muted)">${fmt(r.idealQty * r.valuePrice)}</div>` : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`);
    return;
  }

  // Held lots — qty / price / value
  const HELD_KEYS = ['ticker','buyDate','qty','price','value'];
  const sk  = HELD_KEYS.includes(posSort.key) ? posSort : { key: 'value', dir: -1 };
  const sorted = sortRows(rows, sk.key, sk.dir, { ticker: r => r.ticker, buyDate: r => dateVal(r.buyDate) });
  const total  = sorted.reduce((a,r) => a + r.value + r.charge, 0);
  setContent(`${chips}
    <div class="sec-head">${cat.label} <span class="badge">${sorted.length}</span></div>
    <div class="card" style="padding:12px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between">
        <div><div style="font-size:10px;color:var(--muted)">Total Value</div><div style="font-size:18px;font-weight:700;margin-top:2px">${fmt(total)}</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:var(--muted)">Lots</div><div style="font-size:18px;font-weight:700;margin-top:2px">${sorted.length}</div></div>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="tbl">
        <thead><tr>
          ${th('Scrip','ticker',sk,'setPosSort')}
          ${th('Date','buyDate',sk,'setPosSort')}
          ${th('Qty','qty',sk,'setPosSort')}
          ${th('Price','price',sk,'setPosSort')}
          ${th('Value','value',sk,'setPosSort','right')}
        </tr></thead>
        <tbody>
          ${sorted.map(r => `
            <tr>
              <td>
                <div style="font-weight:600">${r.ticker}</div>
                <div style="font-size:10px;margin-top:1px">${pill(r.strategy)} ${statusPill(r.status)}</div>
              </td>
              <td style="font-size:11px;color:var(--muted)">${r.buyDate||''}</td>
              <td>${r.qty || '—'}</td>
              <td>${r.price ? '₹' + r.price.toLocaleString('en-IN',{maximumFractionDigits:1}) : '—'}</td>
              <td style="text-align:right;font-weight:600">${fmt(r.value)}${(() => {
                // 'no GTT' warning only where one is expected — S0 (Smallcase) and
                // not_in_kite (other demat) carry no sell GTT by design
                const expects = r.status === 'in_holdings' || r.status === 'prior_quarter' ||
                                (r.status === 'other_strategy' && r.strategy === 'S2');
                return r.sellGtt ? `<div style="font-size:9px;color:var(--muted)">GTT ✓</div>`
                     : expects   ? `<div style="font-size:9px;color:var(--warn)">no GTT</div>` : '';
              })()}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `);
}

// ── Progress S1 — booking projection (mobile-friendly 3-col table) ────────────
function renderProgressS1() {
  const lots = state.prog1Lots || [];
  const book = state.prog1Book || [];
  if (lots.length === 0 && book.length === 0) {
    setContent(`
      <div class="card" style="text-align:center;padding:32px;color:var(--muted)">
        <div style="font-size:32px;margin-bottom:8px">📋</div>
        <div>Progress_S1 tab not found in this sheet yet.</div>
      </div>`);
    return;
  }
  // Booked slots from the lot matrix — base is FUNDED lots only (rows without Inv are just pre-created)
  const fundedLots  = lots.filter(l => parseFloat(l.inv) > 0).length;
  const fundedSlots = fundedLots * 10;
  const bookedSlots = lots.reduce((a, l) => a + l.slots.filter(s => s.toLowerCase() === 'booked').length, 0);
  const pct = fundedSlots ? Math.round(bookedSlots / fundedSlots * 100) : 0;

  // S1 PAT — overall + FY-wise (from Yearly Summary)
  const s1Sum   = state.summary.filter(r => r.strategy === 'S1');
  const s1Total = s1Sum.reduce((a, r) => a + r.pat, 0);
  const s1FYs   = [...new Set(s1Sum.map(r => r.fy))].sort().reverse();
  const p1Sub = 'background:var(--wash);border-color:var(--inborder)';
  const patCard = s1Sum.length ? `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="mini-label">S1 PAT Earned</div>
        <div style="font-size:10px;color:var(--muted)">${s1Sum.reduce((a,r) => a + r.lots, 0)} closed lots · all time</div>
      </div>
      <div class="mini-value ${cls(s1Total)}" style="font-size:26px;margin:2px 0 10px">${fmt(s1Total)}</div>
      <div class="grid-3" style="margin-bottom:0">
        ${s1FYs.map(fy => {
          const rows = s1Sum.filter(r => r.fy === fy);
          const pat  = rows.reduce((a,r) => a + r.pat, 0);
          const lc   = rows.reduce((a,r) => a + r.lots, 0);
          return `
        <div class="mini-card" style="${p1Sub}">
          <div class="mini-label">${fy}</div>
          <div class="mini-value ${cls(pat)}" style="font-size:14px">${fmt(pat)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">${lc} lots</div>
        </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // ── Funds: grid Inv total + YS S1 booked/floating; profit booked = slots × 1k
  const s1Fund     = state.fundBlock.s1 || {};
  const invTotal   = lots.reduce((a, l) => a + (parseFloat(l.inv) || 0), 0);
  const bookedAmt  = bookedSlots * 1000;
  const floatS1    = s1Fund['Floating Funds'] || 0;
  const ysBookedS1 = s1Fund['Booked Funds'] || 0;
  const recovPct   = invTotal ? Math.round(bookedAmt / invTotal * 100) : 0;

  // ── Per-lot completion + next-split ETA (last scheduled slot per lot)
  const lotRows = lots.map(l => {
    const b    = l.slots.filter(s => s.toLowerCase() === 'booked').length;
    const pend = l.slots.filter(s => s && s.toLowerCase() !== 'booked');
    return { num: l.num, month: l.month, inv: parseFloat(l.inv) || 0, b,
             eta: pend.length ? pend[pend.length - 1] : null };
  });
  const nextSplit = lotRows
    .filter(r => r.b < 10 && r.eta && String(r.num).indexOf('.') === -1)
    .sort((a, b) => (parseMonYY(a.eta) || 9e15) - (parseMonYY(b.eta) || 9e15))[0];

  // Next flip — earliest scheduled (non-booked) slot month across all lots
  let nextFlip = null;
  lots.forEach(l => l.slots.forEach(s => {
    if (!s || s.toLowerCase() === 'booked') return;
    const d = parseMonYY(s);
    if (d && (!nextFlip || d < nextFlip.d)) nextFlip = { d, m: s, num: l.num, month: l.month };
  }));

  const p1Cell = (l, v, c) => `
      <div class="mini-card" style="${p1Sub};padding:8px 6px;min-width:0">
        <div class="mini-label" style="font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l}</div>
        <div style="font-size:12px;font-weight:700;color:${c || 'inherit'}">${v}</div>
      </div>`;
  const p1Arrow = '<span style="color:var(--muted);font-size:12px;font-weight:700;text-align:center">→</span>';
  const fundsCard = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="mini-label">S1 Invested</div>
        <div style="font-size:10px;color:var(--muted)">booked run-rate · ${lotRows.filter(r => r.inv).length} × ₹10k</div>
      </div>
      <div class="mini-value" style="font-size:26px;margin:2px 0 10px">${fmt(invTotal)}</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:4px;align-items:center">
        ${p1Cell('Floating', fmt(floatS1))}${p1Arrow}${p1Cell('Profit booked', fmt(bookedAmt), 'var(--positive)')}${p1Arrow}${p1Cell('Recovered', recovPct + '%', 'var(--accent)')}
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px">
        Profit booked = ${bookedSlots} × ₹1,000 · recovered vs invested
        ${ysBookedS1 && Math.round(ysBookedS1) !== Math.round(invTotal) ? `<br><span style="color:#fbbf24">⚠ Yearly Summary Booked Funds differs: ${fmt(ysBookedS1)}</span>` : ''}
        ${nextSplit ? `<br>Next split: #${nextSplit.num} ${nextSplit.month} → ${nextSplit.eta}` : ''}
        ${nextFlip ? `<br>Next flip: #${nextFlip.num} ${nextFlip.month} → ${nextFlip.m}` : ''}
      </div>
    </div>`;

  const slotFlex = 'display:flex;width:100%';
  const slotCell = 'flex:1;text-align:center';
  const bpHeader = `<div style="${slotFlex}">${Array.from({length: 10}, (_, i) => `<span style="${slotCell}">${i + 1}</span>`).join('')}</div>`;
  const bpCells = b => `
    <div style="${slotFlex};font-size:11px;font-weight:700">
      ${Array.from({length: 10}, (_, i) => `<span style="${slotCell};color:${i < b ? 'var(--positive)' : 'var(--negative)'}">${i < b ? 'B' : 'P'}</span>`).join('')}
    </div>`;
  const lotsCard = `
    <div class="sec-head" style="margin-top:14px">Lots <span class="badge">${lotRows.filter(r => r.b === 10).length} complete</span></div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="scroll-tbl">
      <table class="tbl">
        <thead><tr><th>#</th><th>Lot</th><th style="width:52%">${bpHeader}</th><th style="text-align:right">Target</th></tr></thead>
        <tbody>
          ${lotRows.map(r => `
          <tr style="${r.inv ? '' : 'opacity:0.5'}">
            <td style="color:var(--muted)">${r.num}</td>
            <td style="font-weight:600">${r.month}${r.inv ? '' : `<div style="font-size:9px;color:var(--muted)">not funded yet</div>`}</td>
            <td>${bpCells(r.b)}</td>
            <td style="text-align:right;font-size:11px;color:${r.b === 10 ? 'var(--positive)' : 'var(--muted)'};font-weight:${r.b === 10 ? 700 : 400}">
              ${r.b === 10 ? '✓ full' : (r.eta || '—')}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      </div>
    </div>`;

  const now = new Date();
  setContent(`
    <div class="sec-head">Progress S1
      <span style="margin-left:auto;display:flex;gap:8px;align-items:center">
        ${!localWB ? `<span class="badge" style="cursor:pointer;color:var(--accent2);font-size:16px;line-height:1" title="Sync bookings" onclick="syncProgress()">↻</span>` : ''}
        <span class="badge" style="cursor:pointer;font-size:16px;line-height:1" title="Back to Dashboard" onclick="showTab('dashboard')">←</span>
      </span></div>
    ${patCard}
    ${fundsCard}
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><span class="pos" style="font-size:20px;font-weight:700">${bookedSlots}</span><span style="color:var(--muted);font-size:12px"> / ${fundedSlots} bookings done · funded lots</span></div>
        <div style="font-size:12px;color:var(--muted)">${pct}%</div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="scroll-tbl">
      <table class="tbl">
        <thead><tr><th>Month</th><th>Bookings</th><th style="text-align:right">Cumulative</th></tr></thead>
        <tbody>
          ${book.map(b => {
            const d = parseMonYY(b.label);
            const isCur    = d && d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
            const isConsol = /consol/i.test(b.label);
            const isPast   = d && d < new Date(now.getFullYear(), now.getMonth(), 1);
            return `<tr style="${isCur ? 'background:rgba(59,130,246,0.12)' : isConsol ? 'background:rgba(139,92,246,0.14)' : ''}">
              <td style="font-weight:${isConsol || isCur ? 700 : 600};${isCur ? 'color:var(--accent)' : isConsol ? 'color:var(--accent2)' : isPast ? 'color:var(--positive)' : ''}">${b.label}${isCur ? ' ←' : ''}</td>
              <td style="${isConsol ? 'color:var(--accent2);font-weight:700' : ''}">${b.cnt || '—'}</td>
              <td style="text-align:right;font-weight:600;color:${isConsol ? 'var(--accent2)' : 'var(--muted)'}">${b.cum || '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
    </div>
    ${lotsCard}`);
}

// ── Add EMI (Progress S2) ─────────────────────────────────────────────────────
let emiFormOpen = false;
function toggleEmiForm() { emiFormOpen = !emiFormOpen; renderProgressS2(); }
async function submitEmi() {
  const t = parseFloat(document.getElementById('emi-total').value);
  const p = parseFloat(document.getElementById('emi-principal').value) || 0;
  const d = document.getElementById('emi-date').value;
  if (!t) { alert('Enter the total EMI amount.'); return; }
  const i = p ? Math.round((t - p) * 100) / 100 : 0;
  if (!confirm('Record EMI ₹' + t + (p ? ' (principal ₹' + p + ' + interest ₹' + i + ')' : '') + (d ? ' dated ' + d : '') + '?')) return;
  try {
    const j = await waPost({ fn: 'add_emi', total: t, principal: p || null, interest: i || null, date: d || null });
    alert('EMI recorded → ' + (j.month || 'row ' + j.row) + '\nTotal EMIs paid: ₹' + Math.abs(j.emiTotalPaid).toLocaleString('en-IN'));
    emiFormOpen = false;
    await loadData(); showTab('ps2');
  } catch (e) { alert('Failed: ' + e.message); }
}
function emiFormHtml() {
  if (localWB) return '';
  if (!emiFormOpen) return `<div class="card" style="padding:10px 14px;cursor:pointer;color:var(--accent);display:flex;justify-content:space-between;align-items:center" onclick="toggleEmiForm()">
    <span>＋ Add this month's EMI</span>
    <span class="badge" style="cursor:pointer;font-size:16px;line-height:1;color:var(--text)" title="Back to Dashboard" onclick="event.stopPropagation();showTab('dashboard')">←</span>
  </div>`;
  const today = new Date().toISOString().substring(0, 10);
  return `<div class="card" style="overflow:hidden">
    <div class="card-title">Record EMI</div>
    <input id="emi-date" type="date" value="${today}" class="inp"/>
    <input id="emi-total" type="number" inputmode="decimal" placeholder="Total EMI (e.g. 16986)" class="inp"/>

// Progress_S1 sync: monthly Inv fill + new lot rows + flip (floor(PAT/1000)) + splits
async function syncProgress() {
  if (!confirm('Sync Progress S1?\n• fills Inv for months that arrived + adds new monthly lot rows\n• flips floor(PAT/1000) − already-booked slots to Booked\n• splits fully booked lots into {id}.1 / {id}.2')) return;
  try {
    const j = await waPost({ fn: 'sync_progress' });
    let msg = j.flipped
      ? 'Flipped ' + j.flipped + ' slot(s):\n' + (j.cells || []).join('\n') +
        '\n\nBooked: ' + j.booked + ' → ' + (j.booked + j.flipped) + ' (target ' + j.target + ', S1 PAT ₹' + Math.round(j.s1pat).toLocaleString('en-IN') + ')'
      : 'Bookings up to date — ' + j.booked + '/' + j.target + ' booked (S1 PAT ₹' + Math.round(j.s1pat).toLocaleString('en-IN') + ').';
    const extra = [];
    if ((j.newLots   || []).length) extra.push('🆕 New lot(s): '  + j.newLots.join(', '));
    if ((j.invFilled || []).length) extra.push('💰 Inv filled: '  + j.invFilled.join(', '));
    if ((j.splits    || []).length) extra.push('🔀 Split: '       + j.splits.join('; '));
    if (j.projShift) extra.push('📅 Projection shifted +' + j.projShift + ' month(s) → opens at ' + j.projFirst + ' (ahead of schedule)');
    alert(msg + (extra.length ? '\n\n' + extra.join('\n') : ''));
    await loadData(); showTab('ps1');
  } catch (e) { alert('Sync failed: ' + e.message); }
}

// consecutive prompt() dialogs) → Kite Publisher basket with the order
// prefilled; PG confirms inside Kite. Fill reconciles as a normal manual S2.
let buyFormTicker = null;
function toggleBuyForm(t) { buyFormTicker = buyFormTicker === t ? null : t; renderProspects(); }

// Opens the Kite Publisher basket with the prefilled BUY — the order is
// reviewed and placed inside PG's own Kite session (his device, his IP — no
// SEBI static-IP issue). The fill then reconciles as a normal manual S2 buy:
// ₹50k lots exceed the 2×budget ambiguity threshold → auto ADD_S2_ROW +
// two-leg exit GTT on the next run, zero reconciler changes.
let kiteApiKey = null;
async function submitBuy(ticker, cmp) {
  const qty  = parseInt(document.getElementById('buy-qty').value, 10);
  const pRaw = document.getElementById('buy-px').value.trim();
  const price = pRaw === '' ? 0 : parseFloat(pRaw);
  if (!qty || qty <= 0) { alert('Enter a valid quantity.'); return; }
  if (pRaw !== '' && (!price || price <= 0)) { alert('Enter a valid price, or clear it for MARKET.'); return; }
  const btn = document.getElementById('buy-go');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  try {
    if (!kiteApiKey) {
      const j = await waGet({ fn: 'ping' });
      kiteApiKey = ((j.loginUrl || '').match(/api_key=([^&]+)/) || [])[1] || null;
    }
    if (!kiteApiKey) { alert('KITE_API_KEY not available (check ⚙ web-app URL/token).'); renderProspects(); return; }
    const order = { exchange: 'NSE', tradingsymbol: ticker, transaction_type: 'BUY',
                    quantity: qty, product: 'CNC', order_type: price ? 'LIMIT' : 'MARKET' };
    if (price) order.price = price;
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = 'https://kite.zerodha.com/connect/basket';
    form.target = '_blank';
    const add = (n, v) => { const i = document.createElement('input'); i.type = 'hidden'; i.name = n; i.value = v; form.appendChild(i); };
    add('api_key', kiteApiKey);
    add('data', JSON.stringify([order]));
    document.body.appendChild(form);
    form.submit();
    form.remove();
    buyFormTicker = null;
    renderProspects();
  } catch (e) {
    alert('Could not open Kite basket: ' + e.message);
    renderProspects();
  }
}

    <div class="sub-tabs">
      <div class="sub-tab ${allFY?'active':''}" onclick="renderClosed('ALL')">All</div>
      ${fys.map(f => `<div class="sub-tab ${f===fy?'active':''}" onclick="renderClosed('${f}')">${f}</div>`).join('')}
    </div>` : ''}
    ${stratChips(closedStratSet, 'toggleClosedStrat', fyRows)}
    <div class="grid-3">
      <div class="mini-card"><div class="mini-label">PAT</div><div class="mini-value ${cls(totalPAT)}">${fmt(totalPAT)}</div></div>
      <div class="mini-card"><div class="mini-label pos">Wins</div><div class="mini-value pos">${wins}</div></div>
      <div class="mini-card"><div class="mini-label neg">Loss</div><div class="mini-value neg">${loss}</div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="tbl">
        <thead><tr>
          ${th('Scrip','scrip',closedSort,'setClosedSort')}
          ${th('Buy → Sell','sellDate',closedSort,'setClosedSort')}
          ${th('PAT','pat',closedSort,'setClosedSort','right')}
        </tr></thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><div style="font-weight:600">${r.scrip}</div><div style="font-size:10px;margin-top:1px">${pill(r.strategy)} ${r.qty} × ₹${r.buyPrice.toLocaleString('en-IN',{maximumFractionDigits:1})} → ₹${r.sellPrice.toLocaleString('en-IN',{maximumFractionDigits:1})}</div></td>
              <td style="font-size:11px;color:var(--muted)">${r.buyDate||''}<br>${r.sellDate||''}</td>
              <td style="text-align:right;font-weight:600" class="${cls(r.pat)}">${fmt(r.pat)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `);
}

// ── Settings ──────────────────────────────────────────────────────────────────
function saveSettings() {
  const sid = document.getElementById('sid-input').value.trim();
  const url = document.getElementById('wa-url-input').value.trim();
  const tok = document.getElementById('wa-token-input').value.trim();
  if (sid) { SHEET_ID = sid; localStorage.setItem('vtp_sheet_id', sid); }
  if (url) { WA_URL = url;   localStorage.setItem('vtp_wa_url', url); }
  if (tok) { WA_TOKEN = tok; localStorage.setItem('vtp_wa_token', tok); }
  document.getElementById('config').classList.remove('open');
  loadData();
}

// ── Web App bridge — Run VTP + execute actions from the phone ─────────────────
async function waPost(payload) {
  if (!WA_URL) throw new Error('Web App URL not set — tap ⚙ and add URL + token');
  payload.token = WA_TOKEN;
  const res = await fetch(WA_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },   // avoids CORS preflight
    body: JSON.stringify(payload),
  });
  const j = await res.json();
  if (!j.ok) throw new Error(j.error || 'web app error');
  return j;
}

async function waGet(params) {
  if (!WA_URL) throw new Error('Web App URL not set — tap ⚙ and add URL + token');
  const qs = new URLSearchParams({ ...params, token: WA_TOKEN }).toString();
  const res = await fetch(WA_URL + '?' + qs);
  const j = await res.json();
  if (!j.ok) throw new Error(j.error || 'web app error');
  return j;
}

async function kiteLogin() {
  try {
    const j = await waGet({ fn: 'ping' });
    if (!j.loginUrl) { alert('KITE_API_KEY not set in Script Properties.'); return; }
    const age = j.tokenTs ? 'Last token: ' + j.tokenTs + '\n\n' : '';
    if (!confirm(age + 'Open Kite login?\nAfter logging in you\'ll land on a ✅ confirmation page — then come back here and Run VTP.')) return;
    window.open(j.loginUrl, '_blank');
  } catch (e) {
    alert('Kite login failed to start: ' + e.message);
  }
}

// ── Log viewer ────────────────────────────────────────────────────────────────
function showLogs(lines, title) {
  document.getElementById('logtitle').textContent = title || 'Run Log';
  const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
  document.getElementById('logbody').innerHTML =
    (lines && lines.length ? lines : ['(no log lines returned)']).map(l => {
      const e = esc(l);
      if (/ERROR|FAIL|WARN/i.test(e))                                   return '<span style="color:#f87171">' + e + '</span>';
      if (/Phase \d|RESET|Executing|Daily check complete|Execution complete/i.test(e)) return '<span style="color:#60a5fa;font-weight:700">' + e + '</span>';
      if (/PLACE_|REORDER|CANCEL|DELETE_|CLOSE_|CLASSIFY|Closed trade|GTT placed/i.test(e)) return '<span style="color:#34d399">' + e + '</span>';
      return '<span style="color:#8b949e">' + e + '</span>';
    }).join('\n');
  document.getElementById('logmodal').style.display = 'flex';
}
async function viewLastLog() {
  try { const j = await waGet({ fn: 'logs', n: 150 }); showLogs(j.logs, 'RunLog — last ' + (j.logs || []).length + ' lines'); }
  catch (e) { alert('Could not fetch logs: ' + e.message); }
}

async function runVtp() {
  if (localWB) { alert('Local file mode — switch back to the sheet first (☁).'); return; }
  if (!confirm('Run the VTP daily check now?')) return;
  const btn = document.getElementById('runvtp-btn');
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const j = await waPost({ fn: 'run' });
    const pend = (j.actions || []).filter(a => a.status === 'Pending').length;
    selectedRows.clear();
    showLogs(j.logs, '✅ Daily check complete — ' + pend + ' pending action(s)');
    await loadData();
    showTab('trades');
  } catch (e) {
    alert('Run failed: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '▶';
  }
}

// Balance-only refresh — one margins call, no sheets reload, no VTP run
async function refreshBalance() {
  const el = document.getElementById('bal-refresh');
  if (el) el.textContent = '⏳';
  try {
    state.funds = (await waGet({ fn: 'funds' })).funds || null;
  } catch (e) {
    alert('Balance fetch failed: ' + e.message);
  }
  renderDashboard();
}

async function syncBalance() {
  const live = state.funds && state.funds.live;
  if (live == null) return;
  if (!confirm('Write live Kite balance ' + fmt(live) + ' into Yearly Summary → Actual Fund Balance?')) return;
  try {
    const j = await waPost({ fn: 'sync_balance' });
    alert('Sheet updated: ' + j.cell + ' = ₹' + Math.round(j.balance).toLocaleString('en-IN'));
    await loadData();
  } catch (e) {
    alert('Sync failed: ' + e.message);
  }
}

const selectedRows = new Set();
function selectAllActions(el) {
  const rows = state.actions.filter(a => a.status !== 'Done').map(a => a.sheetRow);
  if (el.checked) rows.forEach(r => selectedRows.add(r));
  else selectedRows.clear();
  renderActions();
}
function toggleRowSel(row, el) {
  if (el.checked) selectedRows.add(row); else selectedRows.delete(row);
  const bar = document.getElementById('exec-count');
  if (bar) bar.textContent = selectedRows.size + ' selected';
  const btn = document.getElementById('exec-btn');
  if (btn) btn.disabled = selectedRows.size === 0;
}

async function executeSelected() {
  if (localWB) { alert('Local file mode — execution needs the live sheet (☁).'); return; }
  if (selectedRows.size === 0) return;
  const rows = [...selectedRows];
  const verify = {}, classify = {}, overrides = {};
  const ovNotes = [];
  for (const a of state.actions) {
    if (!selectedRows.has(a.sheetRow)) continue;
    verify[a.sheetRow] = { action: a.action, symbol: a.symbol };
    if (a.action === 'CLASSIFY_FILL') {
      const sel = document.getElementById('cls-' + a.sheetRow);
      const v = sel ? sel.value : '';
      if (v !== 'S1' && v !== 'S2') { alert('Pick S1 or S2 for ' + a.symbol + ' first.'); return; }
      classify[a.sheetRow] = v;
    }
    // Edited ✏ price/qty → overrides (only when changed from the recommended value)
    const px = document.getElementById('px-' + a.sheetRow);
    const qt = document.getElementById('qty-' + a.sheetRow);
    if (px || qt) {
      const o = {};
      if (px && px.value !== '' && parseFloat(px.value) !== parseFloat(a.recPrice)) o.price = parseFloat(px.value);
      if (qt && qt.value !== '' && parseInt(qt.value, 10) !== parseInt(a.recQty, 10)) o.qty = parseInt(qt.value, 10);
      if (o.price != null || o.qty != null) {
        overrides[a.sheetRow] = o;
        ovNotes.push(a.symbol + (o.price != null ? ' ₹' + o.price : '') + (o.qty != null ? ' qty ' + o.qty : ''));
      }
    }
  }
  if (!confirm('Execute ' + rows.length + ' action(s)?' +
      (ovNotes.length ? '\n✏ Edited: ' + ovNotes.join(', ') : '') +
      '\nThis places/cancels REAL GTT orders on Zerodha.')) return;
  const btn = document.getElementById('exec-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Executing…'; }
  try {
    const j = await waPost({ fn: 'execute', rows, verify, classify, overrides });
    selectedRows.clear();
    showLogs(j.logs, (j.errors ? '⚠️ ' : '✅ ') + j.executed + ' executed, ' + j.errors + ' error(s)');
    await loadData();
  } catch (e) {
    alert('Execute failed: ' + e.message);
    renderActions();
  }
}

// ── XIRR ─────────────────────────────────────────────────────────────────────
const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
// "Jul'26" / "Jul '26" / "Jul-2026" → Date(2026, 6, 1). Safari-safe.
function parseMonYY(s) {
  const m = String(s || '').trim().match(/^([A-Za-z]{3,})['’\s\-]*(\d{2,4})$/);
  if (!m) return null;
  const mo = MONTHS[m[1].slice(0, 3).toLowerCase()];
  if (mo === undefined) return null;
  let y = parseInt(m[2], 10);
  if (y < 100) y += 2000;
  return new Date(y, mo, 1);
}
function parsePortDate(s) {
  if (!s) return null;
  s = String(s).trim();
  let m = s.match(/^Date\((\d{4}),(\d+),(\d+)\)$/);
  if (m) return new Date(+m[1], +m[2], +m[3]);
  m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/);
  if (m) { const mo = MONTHS[m[2].toLowerCase()]; if (mo!==undefined) return new Date(+m[3], mo, +m[1]); }
  const n = parseFloat(s);
  if (!isNaN(n) && n > 40000) return new Date((n - 25569) * 86400 * 1000);
  return null;
}
function computeXIRR(cfs, guess=0.1) {
  if (!cfs || cfs.length < 2) return null;
  const d0 = cfs[0].date.getTime();
  const MS_YEAR = 365.25 * 24 * 3600 * 1000;
  const npv  = r => cfs.reduce((s, cf) => s + cf.amount / Math.pow(1+r, (cf.date.getTime()-d0)/MS_YEAR), 0);
  const dnpv = r => cfs.reduce((s, cf) => { const t=(cf.date.getTime()-d0)/MS_YEAR; return s - t*cf.amount/Math.pow(1+r,t+1); }, 0);
  let r = guess;
  for (let i=0; i<200; i++) { const f=npv(r),df=dnpv(r); if(Math.abs(df)<1e-12) break; const r2=r-f/df; if(Math.abs(r2-r)<1e-8) return r2; r=r2; }
  return null;
}
function s2FundPV(includeEmi) {
  const s2 = (state.fundBlock.s2 || {});
  const invested = Math.abs(s2['Currently Invested'] || state.fundBlock.invested || 0);
  const ideal    = s2['Ideal Fund Balance'] || s2['Ideal'] || state.fundBlock.ideal || 0;
  const taxProv  = s2['Tax Provision'] || s2['Tax Pending'] || state.fundBlock.taxPending || 0;
  const cashOut  = Math.abs(s2['Cash Out'] || 0);
  return invested + ideal - taxProv + (includeEmi ? 0 : cashOut);
}
function loanDate() {
  for (const r of state.s2xirr) {
    if ((r.type||'').toLowerCase() === 'loan') { const d = parsePortDate(r.date); if (d) return d; }
  }
  return new Date(2026, 5, 1);
}
function loanAmount() {
  for (const r of state.s2xirr) {
    if ((r.type||'').toLowerCase() === 'loan') return Math.abs(r.amount);
  }
  return 713000;
}
function buildCF_Net() {
  const today = new Date(); today.setHours(0,0,0,0);
  return [{ date: loanDate(), amount: -loanAmount() }, { date: today, amount: s2FundPV(true) }];
}
function buildCF_Gross() {
  const today = new Date(); today.setHours(0,0,0,0);
  return [{ date: loanDate(), amount: -loanAmount() }, { date: today, amount: s2FundPV(false) }];
}
function buildCF_Interest() {
  const cfs = [{ date: loanDate(), amount: -loanAmount() }];
  let hasInterest = false;
  for (const r of state.s2xirr) {
    if ((r.type||'').toLowerCase() !== 'emi' || r.interest == null) continue;
    const d = parsePortDate(r.date);
    if (d) { cfs.push({ date: d, amount: -Math.abs(r.interest) }); hasInterest = true; }
  }
  if (!hasInterest) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  cfs.push({ date: today, amount: s2FundPV(false) });
  cfs.sort((a,b) => a.date - b.date);
  return cfs;
}
